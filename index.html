<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mordheim · Warband Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* Mordheim Warband Tracker — illuminated gothic, legibility pass */
:root {
  /* Darks — opened up so cards have somewhere to sit */
  --bg: #0e0a06;
  --bg-2: #1c150e;
  --bg-3: #271d12;
  --bg-card: #1a130c;
  --bg-card-top: #251a10;     /* upper edge of card for inner-light */
  /* Inks — pulled brighter for readability */
  --ink: #ecdcb0;
  --ink-dim: #b4a07a;
  --ink-faint: #7a6a4d;
  --ink-mute: #5a4d35;
  /* Rules — visible without shouting */
  --rule: #3d3022;
  --rule-bright: #5e4a32;
  --rule-gold: #7a5e36;
  /* Accents */
  --blood: oklch(0.55 0.16 28);
  --blood-bright: oklch(0.62 0.18 28);
  --blood-dim: oklch(0.36 0.11 25);
  --candle: oklch(0.84 0.14 78);
  --candle-bright: oklch(0.90 0.15 82);
  --candle-dim: oklch(0.62 0.12 72);
  --bone: #e8d8ab;
  --shadow: rgba(0,0,0,0.55);
  --shadow-deep: rgba(0,0,0,0.85);
  /* Atmosphere intensity (knob) */
  --atm: 1;
  --paper: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.06  0 0 0 0 0.03  0 0 0 0.55 0'/></filter><rect width='240' height='240' filter='url(%23n)' opacity='0.5'/></svg>");
  --grain: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='1' seed='7'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.85  0 0 0 0 0.6  0 0 0 0.08 0'/></filter><rect width='160' height='160' filter='url(%23g)'/></svg>");

  --serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;
  --display: "Cinzel", "Cormorant Garamond", serif;
  --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;

  --r: 2px;
  --tap: 44px;
}

[data-theme="light"] {
  --bg: #efe2c0;
  --bg-2: #e6d4a9;
  --bg-3: #d9c188;
  --bg-card: #ebdcae;
  --bg-card-top: #f1e6c2;
  --ink: #1f160a;
  --ink-dim: #4a361d;
  --ink-faint: #735733;
  --ink-mute: #8b6f48;
  --rule: #a08252;
  --rule-bright: #76582f;
  --rule-gold: #876430;
  --blood: oklch(0.42 0.18 26);
  --blood-bright: oklch(0.48 0.20 26);
  --blood-dim: oklch(0.55 0.14 26);
  --candle: oklch(0.42 0.14 60);
  --candle-bright: oklch(0.38 0.16 60);
  --candle-dim: oklch(0.50 0.10 60);
  --bone: #3a2814;
  --shadow: rgba(70,45,20,0.25);
  --shadow-deep: rgba(60,40,15,0.4);
  --paper: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.30  0 0 0 0 0.20  0 0 0 0 0.10  0 0 0 0.35 0'/></filter><rect width='240' height='240' filter='url(%23n)' opacity='0.55'/></svg>");
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.55;
  font-weight: 500;
  overflow-x: hidden;
  position: relative;
  transition: background-color 600ms ease, color 600ms ease;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* paper texture — dialed back, no longer competing with text */
body::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
  background-image: var(--paper);
  opacity: calc(0.28 * var(--atm));
  mix-blend-mode: multiply;
}
/* vignette — gentler at edges, never darker than -20% over content */
body::after {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:2;
  background:
    radial-gradient(ellipse 120% 90% at 50% 50%, transparent 55%, rgba(0,0,0,0.45) 100%);
  opacity: calc(0.55 * var(--atm));
  transition: opacity 600ms ease;
}
[data-theme="light"] body::after {
  background: radial-gradient(ellipse 120% 90% at 50% 50%, transparent 60%, rgba(80,55,20,0.25) 100%);
  opacity: calc(0.6 * var(--atm));
}

/* drifting ash */
.ash-layer { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; opacity: var(--atm); }
.ash {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: var(--ink-faint);
  opacity: 0; filter: blur(0.8px);
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translate3d(0, -20px, 0) translateX(0); opacity: 0; }
  10%  { opacity: 0.55; }
  90%  { opacity: 0.35; }
  100% { transform: translate3d(0, 110vh, 0) translateX(60px); opacity: 0; }
}

/* fog — quieter */
.fog {
  position: fixed; inset: 0; pointer-events: none; z-index: 4;
  background:
    radial-gradient(circle at 20% 90%, rgba(45,30,18,0.25), transparent 45%),
    radial-gradient(circle at 85% 15%, rgba(35,22,15,0.22), transparent 50%);
  opacity: calc(0.7 * var(--atm));
  animation: fogShift 30s ease-in-out infinite;
}
@keyframes fogShift {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(-30px) translateY(15px); }
}

.app {
  position: relative; z-index: 10;
  min-height: 100vh;
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 32px 96px;
}

/* ============ Header ============ */
.brand {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0 22px;
  border-bottom: 1px solid var(--rule);
  position: relative;
  gap: 16px;
}
.brand::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -4px;
  height: 1px; background: linear-gradient(90deg, transparent, var(--rule-gold), transparent);
  opacity: 0.55;
}
.brand-mark { display: flex; align-items: center; gap: 16px; min-width: 0; }
.brand-glyph { width: 42px; height: 42px; flex-shrink: 0; }
.brand-glyph .flame { transform-origin: 50% 80%; animation: flicker 2.7s ease-in-out infinite; }
@keyframes flicker {
  0%, 100% { transform: scale(1) rotate(0); opacity: 1; }
  25% { transform: scale(1.06, 0.94) rotate(-1deg); opacity: 0.92; }
  50% { transform: scale(0.96, 1.06) rotate(0.5deg); opacity: 1; }
  75% { transform: scale(1.02, 0.98) rotate(1deg); opacity: 0.95; }
}
.brand-title {
  font-family: var(--display); font-weight: 700;
  letter-spacing: 0.24em; font-size: 26px;
  text-transform: uppercase; color: var(--ink);
  line-height: 1;
}
.brand-subtitle {
  font-family: var(--serif); font-style: italic;
  color: var(--ink-dim); font-size: 16px; letter-spacing: 0.02em;
  margin-top: 5px;
}

.theme-toggle {
  background: var(--bg-2); border: 1px solid var(--rule);
  color: var(--ink-dim); padding: 10px 16px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.20em;
  text-transform: uppercase; min-height: var(--tap);
  transition: all 250ms ease;
  flex-shrink: 0;
}
.theme-toggle:hover { color: var(--candle); border-color: var(--rule-gold); background: var(--bg-3); }

/* ============ Page heading ============ */
.page-heading { margin: 56px 0 36px; text-align: center; position: relative; }
.page-heading h1 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(42px, 6.6vw, 72px); letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--ink);
  line-height: 1.05; text-shadow: 0 2px 24px rgba(0,0,0,0.75);
  position: relative; display: inline-block;
}
[data-theme="light"] .page-heading h1 { text-shadow: 0 1px 0 rgba(255,240,200,0.4); }
.page-heading .epigraph {
  font-style: italic; color: var(--ink-dim); margin-top: 16px;
  font-size: 19px; letter-spacing: 0.02em;
}

.divider {
  display: flex; align-items: center; gap: 16px; margin: 18px auto 14px;
  max-width: 400px; color: var(--rule-gold);
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule-gold), transparent);
}
.divider svg { width: 24px; height: 24px; opacity: 0.85; }

/* ============ Warband cards ============ */
.warband-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 24px;
}
.wb-card {
  background:
    linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 36%, var(--bg-card) 100%);
  border: 1px solid var(--rule-bright);
  border-top-color: var(--rule-gold);
  padding: 26px 24px 22px;
  position: relative;
  cursor: pointer;
  transition: transform 350ms cubic-bezier(.2,.7,.2,1),
              border-color 250ms ease,
              box-shadow 350ms ease;
  overflow: hidden;
  animation: riseT 600ms cubic-bezier(.2,.7,.2,1) both;
  box-shadow: 0 1px 0 rgba(255,220,160,0.04) inset,
              0 18px 40px -20px rgba(0,0,0,0.6),
              0 2px 0 rgba(0,0,0,0.4);
}
[data-theme="light"] .wb-card {
  box-shadow: 0 1px 0 rgba(255,240,200,0.4) inset,
              0 14px 30px -18px rgba(70,45,20,0.4),
              0 2px 0 rgba(120,90,40,0.15);
}

@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes riseT {
  from { transform: translateY(14px); }
  to   { transform: translateY(0); }
}
.wb-card::before {
  content:""; position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(circle at 50% -30%, var(--blood-dim), transparent 60%);
  opacity: 0; transition: opacity 400ms ease;
}
.wb-card:hover {
  border-color: var(--candle-dim);
  transform: translateY(-4px);
  box-shadow: 0 1px 0 rgba(255,220,160,0.08) inset,
              0 28px 60px -20px rgba(0,0,0,0.7),
              0 0 32px -8px var(--candle-dim);
}
.wb-card:hover::before { opacity: 0.4; }

/* gilt corner ornaments */
.wb-card-corner {
  position: absolute; width: 18px; height: 18px;
  border: 1px solid var(--rule-gold); pointer-events: none;
  opacity: 0.75;
  transition: opacity 300ms, border-color 300ms;
}
.wb-card:hover .wb-card-corner { opacity: 1; border-color: var(--candle-dim); }
.wb-card-corner.tl { top: 8px; left: 8px; border-right: 0; border-bottom: 0; }
.wb-card-corner.tr { top: 8px; right: 8px; border-left: 0; border-bottom: 0; }
.wb-card-corner.bl { bottom: 8px; left: 8px; border-right: 0; border-top: 0; }
.wb-card-corner.br { bottom: 8px; right: 8px; border-left: 0; border-top: 0; }

.wb-card .group-tag {
  font-family: var(--mono); font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.30em;
  text-transform: uppercase; color: var(--blood-bright);
  margin-bottom: 10px;
}
.wb-card h3 {
  font-family: var(--display); font-weight: 600; font-size: 28px;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink);
  margin-bottom: 8px; line-height: 1.15;
}
.wb-card .wb-leader {
  font-style: italic; color: var(--ink-dim); font-size: 16px; margin-bottom: 18px;
  line-height: 1.45;
}
.wb-card .wb-leader em { color: var(--candle); font-style: normal; font-family: var(--display); letter-spacing: 0.03em; font-weight: 600; }
.wb-card .wb-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  margin-top: 18px; padding-top: 18px;
  border-top: 1px solid var(--rule);
}
.wb-stat { text-align: center; }
.wb-stat .v {
  font-family: var(--display); font-size: 28px; font-weight: 600; color: var(--ink);
  display: block; line-height: 1.1;
  font-feature-settings: "tnum" on, "lnum" on;
}
.wb-stat.gold .v { color: var(--candle); text-shadow: 0 0 16px rgba(232,200,120,0.18); }
.wb-stat .l {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--ink-dim);
  margin-top: 6px;
}
.wb-card .wb-actions {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--rule);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim);
  gap: 12px;
}
.wb-card .open-cue { color: var(--candle); display: flex; align-items: center; gap: 8px; transition: gap 250ms ease; }
.wb-card:hover .open-cue { gap: 14px; }
.wb-delete {
  background: transparent; border: 0; color: var(--ink-faint); cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; padding: 6px 0;
  min-height: 32px;
  transition: color 200ms;
}
.wb-delete:hover { color: var(--blood-bright); }
.wb-export {
  background: transparent; border: 0; color: var(--ink-faint); cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; padding: 6px 0;
  min-height: 32px;
  transition: color 200ms;
}
.wb-export:hover { color: var(--candle); }

.home-io-bar {
  display: flex; gap: 10px; justify-content: center; margin-top: 14px;
}

/* Add new warband card */
.wb-card.add {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 260px; border-style: dashed; cursor: pointer;
  background: transparent;
  box-shadow: none;
}
.wb-card.add:hover { background: var(--bg-2); box-shadow: 0 0 32px -10px var(--candle-dim); }
.wb-card.add .plus {
  font-family: var(--display); font-size: 64px; color: var(--ink-faint);
  line-height: 1; margin-bottom: 14px; font-weight: 300;
  transition: color 300ms ease, transform 400ms cubic-bezier(.2,.7,.2,1);
}
.wb-card.add:hover .plus { color: var(--candle); transform: rotate(90deg); }
.wb-card.add .label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--ink-dim);
}
.wb-card.add:hover .label { color: var(--ink); }

/* ============ Empty state ============ */
.empty {
  text-align: center; padding: 80px 20px;
  color: var(--ink-dim); font-style: italic;
  font-size: 17px;
}
.empty .big {
  font-family: var(--display); font-size: 30px; color: var(--ink);
  margin-bottom: 14px; letter-spacing: 0.06em;
  font-style: normal; text-transform: uppercase;
}

/* ============ Buttons ============ */
.btn {
  background: var(--bg-2); border: 1px solid var(--rule-bright);
  color: var(--ink); padding: 13px 24px; cursor: pointer;
  font-family: var(--mono); font-size: 12.5px; font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  min-height: var(--tap);
  transition: all 250ms ease;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:hover:not(:disabled) {
  background: var(--bg-3); border-color: var(--candle-dim);
  color: var(--candle); box-shadow: 0 0 28px -8px var(--candle-dim);
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn.primary {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dim) 100%);
  border-color: var(--blood-bright); color: var(--bone);
  text-shadow: 0 1px 0 rgba(0,0,0,0.4);
}
.btn.primary:hover:not(:disabled) {
  background: linear-gradient(180deg, var(--blood-bright) 0%, var(--blood) 100%);
  color: #fff; box-shadow: 0 0 32px -6px var(--blood);
}
.btn.ghost { background: transparent; border-color: transparent; color: var(--ink-dim); }
.btn.ghost:hover:not(:disabled) { color: var(--ink); border-color: var(--rule); background: var(--bg-2); }
.btn.sm { padding: 8px 14px; font-size: 10.5px; letter-spacing: 0.18em; min-height: 36px; }

/* ============ Modal ============ */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 300ms ease;
  padding: 20px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
  border: 1px solid var(--rule-gold);
  width: min(96vw, 740px); max-height: 90vh;
  overflow-y: auto;
  padding: 36px 36px 28px;
  position: relative;
  box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,0,0,0.4);
  animation: modalIn 400ms cubic-bezier(.2,.7,.2,1);
}
.modal::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--candle-dim), transparent);
}
@keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal h2 {
  font-family: var(--display); font-weight: 500; font-size: 28px;
  letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
  margin-bottom: 8px; color: var(--ink);
}
.modal .epigraph { text-align: center; }
.modal-close {
  position: absolute; top: 14px; right: 14px;
  background: transparent; border: 0; color: var(--ink-dim); cursor: pointer;
  font-size: 22px; line-height: 1; padding: 10px;
  min-width: var(--tap); min-height: var(--tap);
  transition: color 200ms;
}
.modal-close:hover { color: var(--blood-bright); }

/* ============ Form ============ */
.field { margin-bottom: 18px; }
.field label {
  display: block; font-family: var(--mono); font-size: 10.5px;
  letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-dim);
  margin-bottom: 8px;
}
.field input, .field textarea, .field select {
  width: 100%; background: var(--bg); color: var(--ink);
  border: 1px solid var(--rule-bright); padding: 14px 14px;
  font-family: var(--serif); font-size: 17px;
  min-height: var(--tap);
  transition: border-color 200ms, box-shadow 200ms;
}
.field input:focus, .field textarea:focus, .field select:focus {
  outline: none; border-color: var(--candle); box-shadow: 0 0 0 1px var(--candle-dim);
}

/* Group select tiles */
.group-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 14px; margin-top: 18px;
}
.group-tile {
  padding: 20px 18px; cursor: pointer;
  background: var(--bg); border: 1px solid var(--rule-bright);
  text-align: left;
  transition: all 250ms ease;
  position: relative;
  min-height: var(--tap);
}
.group-tile:hover { border-color: var(--candle-dim); background: var(--bg-3); transform: translateY(-2px); box-shadow: 0 0 24px -10px var(--candle-dim); }
.group-tile .gt-group {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--candle); margin-bottom: 6px;
}
.group-tile .gt-name {
  font-family: var(--display); font-size: 17px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--ink); margin-bottom: 8px;
}
.group-tile .gt-flavor {
  font-style: italic; color: var(--ink-dim); font-size: 14px; line-height: 1.45;
}

/* ============ Roster page ============ */
.roster-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 18px 0 26px; border-bottom: 1px solid var(--rule);
  margin-bottom: 26px; gap: 22px; position: relative;
}
.roster-header::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -2px;
  height: 1px; background: linear-gradient(90deg, transparent, var(--rule-gold), transparent);
  opacity: 0.4;
}
.roster-title h1 {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(34px, 5.2vw, 54px); letter-spacing: 0.06em;
  text-transform: uppercase; line-height: 1.08; color: var(--ink);
  text-shadow: 0 2px 18px rgba(0,0,0,0.6);
}
.roster-title .roster-sub {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.30em;
  text-transform: uppercase; color: var(--blood-bright); margin-bottom: 10px;
}
.roster-title .roster-flavor {
  font-style: italic; color: var(--ink-dim); margin-top: 12px; font-size: 17px;
  max-width: 64ch; line-height: 1.55;
}
.back-link {
  background: transparent; border: 0; color: var(--ink-dim); cursor: pointer;
  font-family: var(--mono); font-size: 12.5px; font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase; padding: 8px 0;
  min-height: var(--tap);
  display: inline-flex; align-items: center; gap: 10px;
  transition: color 200ms, gap 250ms;
  margin-bottom: 8px;
}
.back-link:hover { color: var(--candle); gap: 14px; }

/* ============ Treasure bar ============ */
.treasure-bar {
  position: sticky; top: 0; z-index: 20;
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
  border: 1px solid var(--rule-gold);
  display: grid; grid-template-columns: repeat(4, 1fr);
  margin-bottom: 32px;
  box-shadow: 0 12px 32px -10px rgba(0,0,0,0.65),
              0 1px 0 rgba(255,220,160,0.05) inset;
}
.treasure-bar::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--candle), var(--candle-bright), var(--candle), transparent);
  opacity: 0.65; pointer-events: none;
}
.tr-cell {
  padding: 22px 24px 20px;
  border-right: 1px solid var(--rule);
  display: flex; flex-direction: column; align-items: flex-start;
  position: relative;
  gap: 6px;
}
.tr-cell:last-of-type { border-right: 0; padding-right: 110px; }
.tr-cell .tr-label {
  font-family: var(--mono); font-size: 11.5px; font-weight: 500;
  letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--ink-dim);
}
.tr-cell .tr-value {
  font-family: var(--display); font-size: 44px; font-weight: 600;
  font-feature-settings: "tnum" on, "lnum" on;
  color: var(--candle);
  display: flex; align-items: baseline; gap: 8px;
  line-height: 1;
  text-shadow: 0 0 28px rgba(232,200,120,0.20), 0 2px 0 rgba(0,0,0,0.4);
}
.tr-cell .tr-value.warn { color: var(--blood-bright); text-shadow: 0 0 28px rgba(220,80,60,0.25); animation: pulseWarn 2.4s ease-in-out infinite; }
@keyframes pulseWarn { 0%,100% { opacity: 1; } 50% { opacity: 0.78; } }
.tr-cell .tr-unit {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.18em;
  color: var(--ink-faint); text-transform: uppercase;
}
.tr-treasury .tr-value { color: var(--candle); }
.tr-wyrd .tr-value { color: var(--ink); }
.tr-warriors .tr-value { color: var(--ink); }
.tr-rating .tr-value { color: var(--blood-bright); }

.tr-adjust {
  display: flex; gap: 6px; margin-top: 10px;
  flex-wrap: wrap;
}
.tr-adjust button {
  background: var(--bg); border: 1px solid var(--rule-bright); color: var(--ink-dim);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.10em;
  padding: 8px 12px; cursor: pointer; min-width: 44px; min-height: 36px;
  transition: all 200ms;
  font-feature-settings: "tnum" on, "lnum" on;
}
.tr-adjust button:hover { color: var(--candle); border-color: var(--candle-dim); background: var(--bg-3); }

/* Edit button on treasury bar */
.tr-edit {
  position: absolute; top: 12px; right: 12px;
  background: var(--bg); border: 1px solid var(--rule-gold);
  color: var(--ink); cursor: pointer;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  padding: 8px 12px 8px 10px;
  display: inline-flex; align-items: center; gap: 8px;
  min-height: 36px;
  transition: all 200ms;
  z-index: 2;
}
.tr-edit svg { width: 14px; height: 14px; flex-shrink: 0; }
.tr-edit:hover { color: var(--candle); border-color: var(--candle); background: var(--bg-3); box-shadow: 0 0 24px -8px var(--candle-dim); }

/* Treasury edit modal */
.modal.treasury-edit .te-row {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
}
.modal.treasury-edit .te-row:first-of-type { border-top: 0; padding-top: 8px; }
.te-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px;
}
.te-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-dim);
}
.te-current {
  font-family: var(--display); font-size: 22px; color: var(--candle);
  font-feature-settings: "tnum" on, "lnum" on;
}
.te-current .te-unit {
  font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
  letter-spacing: 0.16em; text-transform: uppercase;
}
.te-controls {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.te-step {
  background: var(--bg); border: 1px solid var(--rule-bright); color: var(--ink-dim);
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
  padding: 0 12px; cursor: pointer; min-width: 44px; height: 40px;
  transition: all 200ms;
  font-feature-settings: "tnum" on, "lnum" on;
}
.te-step:hover { color: var(--candle); border-color: var(--candle-dim); background: var(--bg-3); }
.te-input {
  background: var(--bg); color: var(--ink);
  border: 1px solid var(--rule-gold);
  font-family: var(--display); font-size: 18px;
  text-align: center;
  height: 40px; width: 80px; flex: 1;
  font-feature-settings: "tnum" on, "lnum" on;
  -moz-appearance: textfield;
}
.te-input::-webkit-outer-spin-button,
.te-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.te-input:focus { outline: none; border-color: var(--candle); box-shadow: 0 0 0 1px var(--candle-dim); }
.te-preview {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.25);
  border-left: 2px solid var(--candle-dim);
  display: flex; align-items: baseline; gap: 12px;
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.06em;
}
.te-new {
  font-family: var(--display); font-size: 20px; color: var(--candle);
  font-feature-settings: "tnum" on, "lnum" on;
}
.te-new .te-unit {
  font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
  letter-spacing: 0.16em; text-transform: uppercase; margin-left: 4px;
}
.te-delta {
  margin-left: auto;
  font-family: var(--display); font-size: 16px;
  padding: 2px 10px;
  font-feature-settings: "tnum" on, "lnum" on;
}
.te-delta.pos { color: var(--candle-bright); background: rgba(232,200,120,0.10); }
.te-delta.neg { color: var(--blood-bright); background: rgba(154,58,44,0.15); }

@media (max-width: 760px) {
  .tr-edit { top: 10px; right: 10px; padding: 8px 12px 8px 10px; min-height: 36px; }
  .te-controls { gap: 4px; }
  .te-step { min-width: 40px; height: 44px; padding: 0 10px; font-size: 12px; }
  .te-input { height: 44px; min-width: 64px; }
}

/* ============ Roster sections ============ */
.section { margin-bottom: 32px; }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
  position: relative;
}
.section-head::after {
  content: ""; position: absolute; left: 0; bottom: -2px; width: 60px; height: 1px;
  background: var(--candle-dim);
}
.section-title {
  font-family: var(--display); font-size: 22px; font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink);
  display: flex; align-items: center; gap: 14px;
}
.section-title .count {
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  color: var(--ink-dim);
  letter-spacing: 0.16em;
}

/* ============ Warrior card ============ */
.warrior {
  background:
    linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 32%, var(--bg-card) 100%);
  border: 1px solid var(--rule-bright);
  padding: 20px 22px;
  margin-bottom: 14px;
  position: relative;
  transition: border-color 250ms, box-shadow 250ms;
  animation: riseT 450ms cubic-bezier(.2,.7,.2,1) both;
  box-shadow: 0 1px 0 rgba(255,220,160,0.03) inset,
              0 4px 12px -6px rgba(0,0,0,0.5);
}
.warrior:hover { border-color: var(--rule-gold); box-shadow: 0 1px 0 rgba(255,220,160,0.05) inset, 0 8px 20px -8px rgba(0,0,0,0.6); }
.warrior.leader {
  border-left: 3px solid var(--blood-bright);
  background:
    linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 32%, var(--bg-card) 100%),
    linear-gradient(90deg, rgba(180,40,30,0.05), transparent 30%);
}
.warrior.leader::before {
  content: "★ LEADER"; position: absolute; top: -1px; left: -3px;
  background: var(--blood); color: var(--bone);
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
  padding: 3px 8px 4px; text-shadow: 0 1px 0 rgba(0,0,0,0.4);
}
.warrior.leader { padding-top: 32px; }

.warrior-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 14px; margin-bottom: 14px; flex-wrap: wrap;
}
.warrior-head > div:first-child { flex: 1; min-width: 200px; }
.warrior-name {
  font-family: var(--display); font-size: 24px; font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--ink); line-height: 1.2;
}
.warrior-name input {
  background: transparent; border: 0; border-bottom: 1px dashed transparent;
  font: inherit; color: inherit; padding: 2px 4px;
  letter-spacing: inherit; text-transform: inherit;
  width: 100%;
  transition: border-color 200ms, background 200ms;
}
.warrior-name input:hover { border-bottom-color: var(--rule-gold); }
.warrior-name input:focus { border-bottom-color: var(--candle); outline: none; background: rgba(0,0,0,0.2); }
.warrior-role {
  font-family: var(--mono); font-size: 12.5px; font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase; color: var(--ink-dim); margin-top: 6px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
}
.warrior-role .sep { color: var(--rule-gold); }
.warrior-role .gc { color: var(--candle); font-weight: 500; }
.warrior-role .xp { color: var(--blood-bright); }
.warrior-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }

/* ============ Stat block ============ */
.statline {
  display: grid; grid-template-columns: repeat(9, 1fr);
  border: 1px solid var(--rule-gold);
  background: var(--bg);
  margin: 16px 0;
  overflow: hidden;
}
.statline .stat {
  text-align: center; padding: 12px 2px 10px;
  border-right: 1px solid var(--rule);
  position: relative;
  background: linear-gradient(180deg, rgba(255,220,160,0.04) 0%, transparent 60%);
}
.statline .stat:last-child { border-right: 0; }
.statline .stat .sl-l {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  color: var(--candle-dim); text-transform: uppercase;
  font-weight: 600;
}
.statline .stat .sl-v {
  font-family: var(--display); font-size: 24px; color: var(--ink);
  margin-top: 4px;
  font-feature-settings: "tnum" on, "lnum" on;
  font-weight: 600;
  line-height: 1;
}

/* ============ gear pills ============ */
.gear-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.gear-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border: 1px solid var(--rule-bright);
  background: rgba(0,0,0,0.30);
  font-family: var(--serif); font-size: 15px; font-weight: 500;
  letter-spacing: 0.01em;
  color: var(--ink);
  min-height: 34px;
  transition: all 200ms;
}
.gear-pill .x {
  cursor: pointer; color: var(--ink-faint);
  margin-left: 2px; padding: 4px 6px;
  transition: color 200ms;
  font-size: 12px; line-height: 1;
}
.gear-pill .x:hover { color: var(--blood-bright); }
.gear-pill .cost { color: var(--candle); font-weight: 500; }

.rules-list {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px;
}
.rule-tag {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--blood-bright);
  border: 1px solid var(--blood-dim); padding: 5px 10px;
  background: rgba(140,40,30,0.15);
}

.warrior-note {
  font-style: italic; color: var(--ink-faint); font-size: 14px;
  margin-top: 10px;
  padding-left: 10px;
  border-left: 1px solid var(--rule);
}

/* equipment picker */
.eq-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
.eq-tile {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--bg); border: 1px solid var(--rule-bright);
  cursor: pointer; transition: all 200ms;
  min-height: var(--tap);
  text-align: left;
}
.eq-tile:hover:not(:disabled) { border-color: var(--candle-dim); background: var(--bg-3); }
.eq-tile:disabled { opacity: 0.35; cursor: not-allowed; }
.eq-tile.eq-tile-free { border-color: #3a5a44; }
.eq-tile.eq-tile-free:hover:not(:disabled) { border-color: #5a8a64; background: #0e1e12; }
.eq-tile.eq-tile-free .eq-cost { color: #80c090; }
.eq-tile .eq-name {
  font-family: var(--serif); font-size: 15px; color: var(--ink);
  text-align: left;
}
.eq-tile .eq-cost {
  font-family: var(--mono); font-size: 12px; color: var(--candle);
  letter-spacing: 0.05em; font-weight: 500;
}
.eq-section-title {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--candle-dim);
  margin: 22px 0 10px;
  display: flex; align-items: center; gap: 12px;
}
.eq-section-title::after {
  content: ""; flex: 1; height: 1px; background: var(--rule);
}

/* recruit panel */
.recruit-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 12px;
}
.recruit-tile {
  background: var(--bg); border: 1px solid var(--rule-bright);
  padding: 16px 18px; text-align: left;
  cursor: pointer; transition: all 250ms ease;
  position: relative;
  min-height: var(--tap);
}
.recruit-tile:hover:not(:disabled) { border-color: var(--candle-dim); transform: translateY(-2px); background: var(--bg-3); box-shadow: 0 0 24px -10px var(--candle-dim); }
.recruit-tile:disabled { opacity: 0.35; cursor: not-allowed; }
.recruit-tile .rt-role {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--blood-bright);
}
.recruit-tile .rt-name {
  font-family: var(--display); font-size: 16px; letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--ink);
  margin-top: 6px;
}
.recruit-tile .rt-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px;
  font-family: var(--mono); font-size: 12px; color: var(--ink-dim);
  letter-spacing: 0.06em;
}
.recruit-tile .rt-cost { color: var(--candle); font-weight: 500; }
.recruit-tile .rt-limit { color: var(--ink-faint); font-size: 11px; }

/* ============ notes / lore block ============ */
.lore-block {
  background:
    linear-gradient(90deg, rgba(140,40,30,0.12), rgba(0,0,0,0.20) 60%);
  border-left: 4px solid var(--blood);
  border-top: 1px solid var(--rule);
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 18px 22px;
  margin-bottom: 28px;
}
.lore-block .l-title {
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--blood-bright); margin-bottom: 10px;
}
.lore-block ul { margin-left: 22px; }
.lore-block li {
  font-size: 16px; color: var(--ink); margin-bottom: 8px;
  font-style: italic; line-height: 1.55;
}
.lore-block li::marker { color: var(--blood-bright); }

/* ============ Rich tooltip ============ */
.tip-wrap { position: relative; }
.tip-wrap > .tip-box {
  position: absolute;
  bottom: calc(100% + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  width: max-content;
  max-width: 320px;
  min-width: 220px;
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
  color: var(--ink);
  border: 1px solid var(--candle-dim);
  box-shadow: 0 16px 44px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,0,0,0.5);
  padding: 14px 16px 15px;
  font-family: var(--serif);
  font-style: normal;
  font-size: 14px;
  line-height: 1.5;
  text-align: left;
  text-transform: none;
  letter-spacing: normal;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  visibility: hidden;
  transition: opacity 180ms ease, transform 220ms cubic-bezier(.2,.7,.2,1), visibility 0s linear 200ms;
}
.tip-wrap:hover > .tip-box,
.tip-wrap:focus-within > .tip-box {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
  transition-delay: 80ms, 80ms, 0s;
}
.tip-wrap > .tip-box::after {
  content: ""; position: absolute; top: 100%; left: 50%; margin-left: -6px;
  border: 6px solid transparent; border-top-color: var(--candle-dim);
}
.tip-wrap > .tip-box::before {
  content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px; margin-top: -1px;
  border: 5px solid transparent; border-top-color: var(--bg-card);
  z-index: 1;
}
.tip-title {
  font-family: var(--display); font-size: 16px; font-weight: 600;
  letter-spacing: 0.04em; color: var(--candle); margin-bottom: 2px;
}
.tip-title-solo { margin-bottom: 0; }
/* When title is followed directly by stats or desc (no subtitle), give it more breathing room */
.tip-title + .tip-stats,
.tip-title + .tip-rules,
.tip-title + .tip-rule-desc-solo {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--rule);
}
.tip-subtitle {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.18em; color: var(--ink-faint);
  padding-bottom: 8px; margin-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}
.tip-cost { color: var(--candle); font-weight: 500; }
.tip-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px; margin-bottom: 10px;
}
.tip-stat { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.tip-stat-l {
  font-family: var(--mono); font-size: 9.5px; text-transform: uppercase;
  letter-spacing: 0.16em; color: var(--ink-faint);
}
.tip-stat-v {
  font-family: var(--display); font-size: 13px; color: var(--ink);
  font-weight: 500; text-align: right;
}
.tip-rules { display: flex; flex-direction: column; gap: 10px; }
.tip-rule-name {
  font-family: var(--display); font-size: 12.5px; font-weight: 600;
  letter-spacing: 0.06em; color: var(--candle);
  text-transform: uppercase; margin-bottom: 2px;
}
.tip-rule-desc {
  font-style: italic; color: var(--ink-dim);
  font-size: 13.5px; line-height: 1.55;
}
.tip-rule-desc-solo { margin-top: 0; }
.tip-note {
  margin-top: 10px; padding-top: 9px;
  border-top: 1px dashed var(--rule);
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.04em;
  color: var(--ink-faint); font-style: normal;
}
.tip-wrap.rule-tag, .tip-wrap.gear-pill, .tip-wrap.eq-tile { cursor: help; }
.tip-wrap.rule-tag:hover { background: rgba(154,58,44,0.18); }
.tip-wrap.gear-pill:hover { border-color: var(--candle-dim); }
.mutation-pill { border-color: var(--blood-dim) !important; color: var(--blood-bright) !important; background: rgba(140,40,30,0.12) !important; }
.mutation-pill:hover { border-color: var(--blood-bright) !important; }

/* keep modals from clipping tooltips */
.modal { overflow: visible; overflow-y: auto; }
.eq-grid { overflow: visible; }

/* utility */
.row { display: flex; align-items: center; gap: 10px; }
.spread { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.muted { color: var(--ink-faint); }
.scroll-hint {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-faint);
  text-align: center; margin-top: 14px;
}

/* ============ Equip cart UI ============ */
.equip-modal { padding-bottom: 96px; }
.equip-footer {
  position: sticky; bottom: -28px;
  margin: 28px -36px -28px;
  padding: 18px 28px;
  background: linear-gradient(180deg, transparent 0%, var(--bg-card) 30%, var(--bg-card) 100%);
  border-top: 1px solid var(--rule-gold);
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  z-index: 2;
}
.equip-footer .btn.primary { min-width: 220px; }

.cart-title {
  color: var(--candle) !important;
  justify-content: space-between;
}
.cart-title::after { background: var(--candle-dim) !important; opacity: 0.5; }
.cart-title .cart-total {
  margin-left: auto;
  font-family: var(--display); font-size: 18px; font-weight: 600;
  color: var(--candle);
  font-feature-settings: "tnum" on, "lnum" on;
  letter-spacing: 0;
  text-transform: none;
}
.cart-pill {
  border-color: var(--candle-dim) !important;
  background: rgba(232,200,120,0.08) !important;
}
.cart-pill .cost { color: var(--candle); font-weight: 600; }

/* ============ Henchman group ============ */
.henchman-group {
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 28%, var(--bg-card) 100%);
  border: 1px solid var(--rule-gold);
  padding: 22px 24px 18px;
  margin-bottom: 18px;
  position: relative;
  animation: riseT 480ms cubic-bezier(.2,.7,.2,1) both;
  box-shadow: 0 1px 0 rgba(255,220,160,0.04) inset,
              0 6px 16px -6px rgba(0,0,0,0.55);
}
.henchman-group::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--candle-dim), transparent);
  opacity: 0.5;
}
.hg-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 14px; margin-bottom: 6px; flex-wrap: wrap;
}
.hg-title {
  display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
}
.hg-name {
  font-family: var(--display); font-size: 22px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink);
  line-height: 1.15;
}
.hg-count {
  font-family: var(--display); font-size: 22px; font-weight: 600;
  color: var(--candle);
  font-feature-settings: "tnum" on, "lnum" on;
  text-shadow: 0 0 16px rgba(232,200,120,0.2);
}
.hg-label {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--ink-dim);
  border: 1px solid var(--rule-bright);
  padding: 3px 10px;
  align-self: center;
}
.hg-note {
  font-style: italic; color: var(--ink-faint); font-size: 14px;
  width: 100%;
  padding-left: 10px;
  border-left: 1px solid var(--rule);
  margin-top: 4px;
}
.hg-statline { margin: 14px 0 10px; }

.hg-members {
  margin-top: 14px;
  border-top: 1px solid var(--rule);
}
.hg-member {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px dashed var(--rule);
}
.hg-member:last-child { border-bottom: 0; padding-bottom: 4px; }
.hg-member-main { flex: 1; min-width: 0; }
.hg-member-name {
  font-family: var(--display); font-size: 18px; font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase; color: var(--ink);
}
.hg-member-name input {
  background: transparent; border: 0; border-bottom: 1px dashed transparent;
  font: inherit; color: inherit; padding: 2px 4px;
  letter-spacing: inherit; text-transform: inherit;
  width: 100%; max-width: 280px;
  transition: border-color 200ms, background 200ms;
}
.hg-member-name input:hover { border-bottom-color: var(--rule-gold); }
.hg-member-name input:focus { border-bottom-color: var(--candle); outline: none; background: rgba(0,0,0,0.2); }
.hg-gear { margin-top: 8px; }
.hg-member-actions {
  display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap;
  align-items: flex-start;
}

/* ============ Hire group dialog ============ */
.hire-card { width: min(96vw, 460px); }
.hire-counter {
  display: flex; align-items: center; justify-content: center; gap: 0;
  margin: 18px 0 12px;
}
.hire-step {
  background: var(--bg); border: 1px solid var(--rule-gold);
  color: var(--ink);
  width: 56px; height: 64px;
  font-family: var(--display); font-size: 28px; font-weight: 600;
  cursor: pointer;
  transition: all 200ms;
}
.hire-step:first-child { border-right: 0; }
.hire-step:last-child { border-left: 0; }
.hire-step:hover:not(:disabled) { color: var(--candle); background: var(--bg-3); border-color: var(--candle); }
.hire-step:disabled { opacity: 0.3; cursor: not-allowed; }
.hire-value {
  background: var(--bg); border: 1px solid var(--candle);
  font-family: var(--display); font-size: 44px; font-weight: 700;
  color: var(--candle);
  width: 110px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-feature-settings: "tnum" on, "lnum" on;
  text-shadow: 0 0 24px rgba(232,200,120,0.3);
}

.hire-pips {
  display: flex; justify-content: center; gap: 6px;
  margin-bottom: 22px;
}
.hire-pip {
  width: 32px; height: 32px;
  background: var(--bg); border: 1px solid var(--rule-bright);
  color: var(--ink-dim);
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 200ms;
}
.hire-pip:hover:not(:disabled) { border-color: var(--candle-dim); color: var(--ink); }
.hire-pip.on { background: var(--candle); color: var(--bg); border-color: var(--candle); }
.hire-pip.blocked { opacity: 0.25; cursor: not-allowed; }

.hire-summary {
  background: rgba(0,0,0,0.3);
  border-left: 2px solid var(--rule-gold);
  padding: 14px 16px;
  margin-bottom: 22px;
}
.hire-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 4px 0;
}
.hire-row-total {
  border-top: 1px solid var(--rule);
  padding-top: 8px; margin-top: 4px;
}
.hire-label {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim);
}
.hire-val {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  color: var(--ink);
  font-feature-settings: "tnum" on, "lnum" on;
}
.hire-val.candle { color: var(--candle); font-size: 22px; }

@media (max-width: 760px) {
  .hg-head { gap: 8px; }
  .hg-name { font-size: 20px; }
  .hg-count { font-size: 20px; }
  .hg-member { flex-direction: column; gap: 10px; padding: 14px 0; }
  .hg-member-actions { width: 100%; }
  .hg-member-actions .btn { flex: 1; }
  .hire-step { width: 52px; height: 60px; font-size: 24px; }
  .hire-value { width: 96px; height: 60px; font-size: 38px; }
  .hire-pip { width: 30px; height: 36px; }
}

/* ============ Detail dialog (nested over equip modal) ============ */
.detail-backdrop {
  position: fixed; inset: 0; z-index: 80;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 200ms ease;
  padding: 20px;
}
.detail-card {
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
  border: 1px solid var(--candle);
  width: min(96vw, 520px);
  max-height: 90vh; overflow-y: auto;
  padding: 32px 32px 24px;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.85),
              0 0 80px -20px var(--candle-dim),
              0 0 0 1px rgba(0,0,0,0.5);
  animation: detailIn 320ms cubic-bezier(.2,.7,.2,1);
}
@keyframes detailIn {
  from { opacity: 0; transform: translateY(20px) scale(0.94); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.detail-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--candle-bright), transparent);
}
.detail-eyebrow {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--blood-bright);
  text-align: center;
  margin-bottom: 8px;
}
.detail-title {
  font-family: var(--display); font-size: 30px; font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--ink);
  text-align: center; line-height: 1.15;
  margin-bottom: 14px;
}
.detail-cost {
  text-align: center;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; justify-content: center; gap: 10px;
}
.detail-cost-v {
  font-family: var(--display); font-size: 44px; font-weight: 700;
  color: var(--candle);
  font-feature-settings: "tnum" on, "lnum" on;
  text-shadow: 0 0 24px rgba(232,200,120,0.25);
  line-height: 1;
}
.detail-cost-u {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase; color: var(--ink-faint);
}
.detail-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px;
  margin-bottom: 22px;
}
.detail-stat {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 12px;
  background: rgba(0,0,0,0.28);
  border-left: 2px solid var(--rule-gold);
}
.detail-stat-l {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim);
}
.detail-stat-v {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  color: var(--ink);
  font-feature-settings: "tnum" on, "lnum" on;
}
.detail-rules {
  display: flex; flex-direction: column; gap: 14px;
  margin-bottom: 22px;
}
.detail-rule {
  padding: 12px 14px;
  background: rgba(140,40,30,0.08);
  border-left: 3px solid var(--blood);
}
.detail-rule-name {
  font-family: var(--display); font-size: 15px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--candle);
  margin-bottom: 4px;
}
.detail-rule-desc {
  font-style: italic; color: var(--ink);
  font-size: 15px; line-height: 1.55;
}
.detail-rule-desc-solo { font-style: italic; color: var(--ink); }
.detail-footer {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-top: 6px;
}
.detail-footer .btn { flex: 1; }

.confirm-card { width: min(94vw, 440px); padding: 32px 28px 24px; }

@media (max-width: 760px) {
  .equip-footer { margin: 24px -20px -24px; padding: 16px 20px; }
  .equip-footer .btn.primary { min-width: 0; flex: 1; }
  .detail-card { padding: 26px 22px 20px; }
  .detail-title { font-size: 24px; }
  .detail-cost-v { font-size: 36px; }
  .detail-stats { grid-template-columns: 1fr; }
}

/* ============ Tweaks panel (built-in tweak hooks) ============ */
/* Hidden by default; visible via React state */

/* ============ MOBILE ============ */
@media (max-width: 760px) {
  body { font-size: 17px; }
  .app { padding: 18px 16px 80px; }

  .brand { flex-wrap: wrap; gap: 12px; padding-bottom: 18px; }
  .brand-mark { gap: 12px; }
  .brand-glyph { width: 36px; height: 36px; }
  .brand-title { font-size: 20px; letter-spacing: 0.18em; }
  .brand-subtitle { font-size: 13px; }
  .theme-toggle { padding: 8px 12px; font-size: 10.5px; }

  .page-heading { margin: 36px 0 28px; }
  .page-heading h1 { font-size: clamp(32px, 9vw, 44px); }
  .page-heading .epigraph { font-size: 15px; padding: 0 12px; }

  .warband-grid { grid-template-columns: 1fr; gap: 16px; }
  .wb-card { padding: 22px 20px 18px; }
  .wb-card h3 { font-size: 22px; }
  .wb-card .wb-leader { font-size: 14px; }

  .roster-header { flex-direction: column; padding-bottom: 22px; }
  .roster-title h1 { font-size: clamp(26px, 7vw, 34px); }
  .roster-title .roster-flavor { font-size: 15px; }

  /* Treasure bar — 2x2 on tablet/phone */
  .treasure-bar { grid-template-columns: 1fr 1fr; }
  .tr-cell {
    border-right: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 16px 18px;
  }
  .tr-cell:nth-child(2n) { border-right: 0; }
  .tr-cell:nth-last-child(-n+2) { border-bottom: 0; }
  .tr-cell:nth-child(2) { padding-right: 100px; } /* leave room for Edit button */
  .tr-cell .tr-value { font-size: 36px; }
  .tr-edit { top: 12px; right: 12px; padding: 8px 12px 8px 10px; }

  /* Warrior cards */
  .warrior { padding: 18px 18px; }
  .warrior.leader { padding-top: 28px; }
  .warrior-head { gap: 10px; }
  .warrior-name { font-size: 19px; }
  .warrior-actions { width: 100%; }
  .warrior-actions .btn { flex: 1; }

  /* Stat line — two-row 5x2 on phones for readability */
  .statline { grid-template-columns: repeat(5, 1fr); border-bottom: 0; }
  .statline .stat { padding: 8px 2px 7px; border-bottom: 1px solid var(--rule); }
  .statline .stat:nth-child(5) { border-right: 0; }
  .statline .stat:nth-last-child(-n+4) { border-bottom: 0; }
  .statline .stat .sl-v { font-size: 17px; }
  .statline .stat .sl-l { font-size: 10px; }

  /* Recruit / equip - bigger touch targets, single column */
  .recruit-grid { grid-template-columns: 1fr; }
  .recruit-tile .statline { grid-template-columns: repeat(9, 1fr); }
  .recruit-tile .statline .stat { border-bottom: 0; }
  .recruit-tile .statline .stat:nth-child(5) { border-right: 1px solid var(--rule); }
  .recruit-tile .statline .stat .sl-v { font-size: 13px; }
  .recruit-tile .statline .stat .sl-l { font-size: 8.5px; letter-spacing: 0.06em; }

  .eq-grid { grid-template-columns: 1fr; }
  .group-grid { grid-template-columns: 1fr; }

  /* Modal — full screen feel on phones */
  .modal-backdrop { padding: 0; align-items: stretch; }
  .modal {
    width: 100%; max-height: 100vh; max-height: 100dvh;
    padding: 28px 20px 24px;
    border-left: 0; border-right: 0;
  }
  .modal h2 { font-size: 22px; }

  /* Tooltips — float full-width near top on mobile */
  .tip-wrap > .tip-box {
    position: fixed;
    left: 12px !important;
    right: 12px;
    bottom: auto;
    top: 12px;
    transform: none !important;
    max-width: none;
    width: auto;
  }
  .tip-wrap > .tip-box::before,
  .tip-wrap > .tip-box::after { display: none; }
}

/* very small phones */
@media (max-width: 380px) {
  .app { padding: 14px 12px 70px; }
  .brand-title { font-size: 18px; }
  .brand-subtitle { font-size: 12px; }
  .wb-card h3 { font-size: 20px; }
}

/* reduce motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
  .ash-layer, .fog { display: none; }
}

/* ============ Tweaks panel ============ */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px; z-index: 200;
  width: 280px;
  background: linear-gradient(180deg, var(--bg-card-top) 0%, var(--bg-card) 100%);
  border: 1px solid var(--candle-dim);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.5);
  padding: 16px 18px;
  font-family: var(--serif);
}
.tweaks-panel .tw-title {
  font-family: var(--display); font-size: 13px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--candle);
  padding-bottom: 8px; margin-bottom: 12px;
  border-bottom: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks-panel .tw-close {
  background: transparent; border: 0; color: var(--ink-dim); cursor: pointer;
  font-size: 16px; padding: 4px 8px;
}
.tweaks-panel .tw-row {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 12px;
}
.tweaks-panel .tw-row label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--ink-dim);
  display: flex; justify-content: space-between; align-items: center;
}
.tweaks-panel .tw-row label .tw-v { color: var(--candle); font-weight: 500; }
.tweaks-panel input[type=range] {
  width: 100%; accent-color: var(--candle);
}
.tweaks-panel .tw-toggle {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--ink-dim);
  cursor: pointer; padding: 8px 0;
  border-top: 1px dashed var(--rule);
}
.tweaks-panel .tw-swatch-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tweaks-panel .tw-swatch {
  width: 28px; height: 28px; border: 1px solid var(--rule-bright);
  cursor: pointer; transition: border-color 200ms, transform 200ms;
}
.tweaks-panel .tw-swatch.active { border-color: var(--candle); transform: scale(1.1); }

@media (max-width: 540px) {
  .tweaks-panel { right: 12px; left: 12px; bottom: 12px; width: auto; }
}

/* ============ Learned Skills pills ============ */
.skills-list {
  display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
}
.skill-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border: 1px solid var(--candle-dim);
  background: rgba(232,200,120,0.07);
  color: var(--candle);
  font-family: var(--serif); font-size: 14px; font-weight: 500;
  letter-spacing: 0.01em;
  min-height: 32px;
  transition: all 200ms;
}
.skill-pill:hover { background: rgba(232,200,120,0.14); border-color: var(--candle); }

/* ============ XP bar on warrior cards ============ */
.xp-bar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--rule);
}
.xp-bar-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.xp-bar-right { display: flex; align-items: center; gap: 10px; }

.xp-bar-label {
  font-family: var(--mono); font-size: 10.5px; font-weight: 600;
  letter-spacing: 0.26em;
  text-transform: uppercase; color: var(--ink-faint);
}
.xp-bar-val {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  color: var(--blood-bright);
  font-feature-settings: "tnum" on, "lnum" on;
  min-width: 28px; text-align: right;
}

.xp-step {
  background: var(--bg); border: 1px solid var(--rule-bright);
  color: var(--ink-dim);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 5px 9px; cursor: pointer; min-height: 30px;
  transition: all 200ms;
}
.xp-step:hover { color: var(--candle); border-color: var(--candle-dim); background: var(--bg-3); }
.xp-step.xp-step-minus { color: var(--ink-faint); }
.xp-step.xp-step-minus:hover { color: var(--blood-bright); border-color: var(--blood-dim); }

.xp-next {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em;
  color: var(--ink-faint); text-transform: uppercase;
  flex-shrink: 0;
}

/* ============ Advance! badge ============ */
.advance-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  background: linear-gradient(180deg, var(--candle) 0%, var(--candle-dim) 100%);
  border: 1px solid var(--candle-bright);
  color: #1a1000;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  cursor: pointer; min-height: 32px;
  animation: advanceGlow 2.2s ease-in-out infinite;
  transition: all 200ms;
  flex-shrink: 0;
}
.advance-badge:hover {
  background: linear-gradient(180deg, var(--candle-bright) 0%, var(--candle) 100%);
  box-shadow: 0 0 24px -4px var(--candle);
  transform: translateY(-1px);
}
@keyframes advanceGlow {
  0%, 100% { box-shadow: 0 0 12px -4px var(--candle); }
  50%       { box-shadow: 0 0 24px -2px var(--candle-bright); }
}

/* ============ Henchman group XP row ============ */
.hg-xp-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--rule);
}
.hg-xp-label {
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  letter-spacing: 0.26em; text-transform: uppercase; color: var(--ink-faint);
}
.hg-xp-val {
  font-family: var(--display); font-size: 16px; font-weight: 600;
  color: var(--blood-bright); min-width: 22px; text-align: right;
  font-feature-settings: "tnum" on, "lnum" on;
}

/* ============ Advancement Modal ============ */
.advance-modal { max-width: 680px; }

/* Mode buttons */
.adv-mode-btns {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 24px;
}
.adv-mode-btn {
  padding: 20px 18px; text-align: left;
  background: var(--bg); border: 1px solid var(--rule-bright);
  cursor: pointer;
  display: flex; flex-direction: column; gap: 4px;
  transition: all 250ms;
}
.adv-mode-btn:hover { border-color: var(--candle-dim); background: var(--bg-3); }
.adv-mode-btn.active {
  border-color: var(--candle);
  background: rgba(232,200,120,0.08);
  box-shadow: 0 0 0 1px var(--candle-dim);
}
.adv-mode-icon {
  font-size: 22px; color: var(--candle); line-height: 1;
  margin-bottom: 4px;
}
.adv-mode-label {
  font-family: var(--display); font-size: 16px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink);
}
.adv-mode-sub {
  font-family: var(--serif); font-size: 13px; font-style: italic;
  color: var(--ink-faint); line-height: 1.4;
}

/* Skill picker */
.adv-skill-section { margin-top: 20px; }
.skill-category { margin-bottom: 18px; }
.skill-cat-title {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--candle-dim);
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}
.skill-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.skill-tile {
  padding: 9px 14px;
  background: var(--bg); border: 1px solid var(--rule-bright);
  cursor: pointer; text-align: left;
  transition: all 200ms;
}
.skill-tile:hover { border-color: var(--candle-dim); background: var(--bg-3); }
.skill-tile.selected {
  border-color: var(--candle);
  background: rgba(232,200,120,0.10);
  box-shadow: 0 0 0 1px var(--candle-dim);
}
.skill-tile-name {
  font-family: var(--serif); font-size: 15px; font-weight: 500;
  color: var(--ink);
}

/* Selected skill detail block */
.skill-detail {
  margin-top: 14px; padding: 14px 16px;
  border-left: 2px solid var(--candle-dim);
  background: rgba(232,200,120,0.05);
}
.skill-detail-name {
  font-family: var(--display); font-size: 15px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--candle); margin-bottom: 6px;
}
.skill-detail-desc {
  font-family: var(--serif); font-size: 15px; font-style: italic;
  color: var(--ink-dim); line-height: 1.5;
}

/* Stat advance grid */
.adv-stat-section { margin-top: 20px; }
.adv-group-note {
  font-style: italic; color: var(--ink-dim); font-size: 15px;
  margin-bottom: 14px; text-align: center;
}
.stat-advance-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
}
.stat-advance-tile {
  padding: 14px 10px; text-align: center;
  background: var(--bg); border: 1px solid var(--rule-bright);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: all 200ms;
  min-height: var(--tap);
}
.stat-advance-tile:hover { border-color: var(--candle-dim); background: var(--bg-3); }
.stat-advance-tile.selected {
  border-color: var(--candle);
  background: rgba(232,200,120,0.10);
  box-shadow: 0 0 0 1px var(--candle-dim);
}
.sat-stat {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.20em; text-transform: uppercase;
  color: var(--candle);
}
.sat-label {
  font-family: var(--serif); font-size: 13px;
  color: var(--ink-dim); line-height: 1.3;
}
.sat-change {
  font-family: var(--display); font-size: 14px; font-weight: 600;
  color: var(--candle-bright);
  font-feature-settings: "tnum" on, "lnum" on;
}

/* Mobile tweaks */
@media (max-width: 600px) {
  .adv-mode-btns { grid-template-columns: 1fr; }
  .stat-advance-grid { grid-template-columns: repeat(3, 1fr); }
  .xp-bar { flex-direction: column; align-items: flex-start; }
}

/* ── Leader badge & promote star ────────────────────────────────── */
.leader-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: var(--candle-bright);
  background: rgba(212, 160, 74, 0.14);
  border: 1px solid rgba(212, 160, 74, 0.45);
  border-radius: 10px;
  padding: 1px 8px;
  margin-left: 6px;
  vertical-align: middle;
  white-space: nowrap;
}

.promote-star {
  background: transparent;
  border: 1px solid #7a2929;
  color: #b05555;
  border-radius: 4px;
  width: 26px;
  height: 26px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  padding: 0;
}
.promote-star:hover {
  background: rgba(176, 85, 85, 0.18);
  border-color: #c06060;
  color: #d07070;
}
.promote-star.active {
  border-color: rgba(212, 160, 74, 0.6);
  color: var(--candle-bright);
  background: rgba(212, 160, 74, 0.12);
}
.promote-star.active:hover {
  background: rgba(212, 160, 74, 0.22);
  border-color: var(--candle-bright);
  color: #f0c060;
}
.promote-star.corner-star {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 30px;
  height: 30px;
  font-size: 16px;
}
.warrior.leader .corner-star { top: 10px; }
.warrior.has-leader-star { padding-right: 50px; }

.dismiss-btn {
  border-color: var(--rule-bright) !important;
  color: var(--ink-faint);
}
.dismiss-btn:hover:not(:disabled) {
  border-color: var(--blood-bright) !important;
  color: var(--blood-bright) !important;
  background: rgba(180,40,30,0.08) !important;
}

/* Notes button */
.notes-btn {
  border-color: var(--rule-bright) !important;
  color: var(--ink-dim);
}
.notes-btn:hover:not(:disabled) {
  border-color: var(--candle) !important;
  color: var(--candle) !important;
  background: rgba(212,160,74,0.08) !important;
}

/* Injuries display in warrior card / henchman row */
.injuries-list {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 10px;
}
.hg-injuries { margin-top: 6px; }
.injury-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(130,30,20,0.18);
  border: 1px solid rgba(180,50,40,0.4);
  color: #c87060;
  border-radius: 4px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 4px 9px;
  cursor: default;
}
.injury-pill.tip-wrap { cursor: default; }

/* ── Warrior user note display ──────────────────────────── */
.warrior-user-note {
  font-size: 13px; color: var(--ink-dim); line-height: 1.55;
  margin-top: 8px; padding: 8px 12px;
  border-left: 2px solid var(--rule-gold);
  background: rgba(255,220,160,0.04);
  border-radius: 0 4px 4px 0;
  white-space: pre-wrap;
}

/* ── Notes Modal ─────────────────────────────────────────── */
.notes-modal { max-width: 520px; }

.notes-section { margin-bottom: 14px; }
.notes-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--ink-faint);
  margin-bottom: 6px;
}
.notes-textarea {
  width: 100%; box-sizing: border-box;
  background: var(--bg-2); border: 1px solid var(--rule);
  border-radius: 5px; color: var(--ink);
  font-family: var(--body, sans-serif); font-size: 14px; line-height: 1.55;
  padding: 10px 12px; resize: vertical;
  transition: border-color 180ms;
}
.notes-textarea:focus {
  outline: none; border-color: var(--candle);
  background: var(--bg-card);
}
.notes-textarea::placeholder { color: var(--ink-faint); font-style: italic; }

.notes-injuries-toggle {
  display: flex; justify-content: space-between; align-items: center;
  width: 100%; background: var(--bg-2); border: 1px solid var(--rule);
  border-radius: 5px; padding: 10px 14px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--ink-dim);
  transition: border-color 180ms, color 180ms, background 180ms;
  margin-bottom: 4px;
}
.notes-injuries-toggle:hover,
.notes-injuries-toggle.open {
  border-color: var(--rule-gold); color: var(--ink);
  background: var(--bg-card);
}
.toggle-caret { font-size: 10px; opacity: 0.6; }

.notes-inj-list { margin-top: 6px; }

/* ── Injury select list (shared by notes modal) ──────────── */
.injury-select-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 440px; overflow-y: auto;
  padding-right: 4px;
}
.injury-select-list::-webkit-scrollbar { width: 4px; }
.injury-select-list::-webkit-scrollbar-track { background: transparent; }
.injury-select-list::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.injury-row {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--bg-2); border: 1px solid var(--rule);
  border-radius: 5px; padding: 10px 12px;
  cursor: pointer; text-align: left; width: 100%;
  transition: border-color 180ms, background 180ms;
}
.injury-row:hover { border-color: var(--rule-gold); background: var(--bg-card); }
.injury-row.active {
  border-color: rgba(180,50,40,0.55);
  background: rgba(130,30,20,0.14);
}
.injury-row.active:hover { border-color: #c04040; }
.injury-check {
  width: 18px; height: 18px; flex-shrink: 0;
  border: 1px solid var(--rule-bright); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #c87060; margin-top: 1px;
}
.injury-row.active .injury-check {
  background: rgba(180,50,40,0.3); border-color: #c05050; color: #e08070;
}
.injury-row-body { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.injury-row-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.injury-row-name {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink);
}
.injury-row.active .injury-row-name { color: #d88070; }
.injury-stat-badge {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  background: rgba(180,40,30,0.25); border: 1px solid rgba(180,50,40,0.4);
  color: #c87060; border-radius: 3px; padding: 1px 6px; text-transform: uppercase;
}
.injury-row-desc {
  font-size: 12.5px; color: var(--ink-faint); line-height: 1.45;
  font-style: italic;
}

/* ── Arcane spell button ─────────────────────────────────────────── */
.btn.sm.arcane {
  background: transparent;
  border: 1px solid #7b5ea7;
  color: #b49dd4;
  font-size: 11px;
}
.btn.sm.arcane:hover {
  background: rgba(123, 94, 167, 0.18);
  border-color: #b49dd4;
  color: #d4c0f0;
}

/* ── Spell pill (known spell on warrior card) ────────────────────── */
.spell-pill {
  background: rgba(123, 94, 167, 0.18);
  border: 1px solid #7b5ea7;
  color: #b49dd4;
}
.spell-pill:hover .tip-box { display: block; }

/* ── Henchman group name editable input ─────────────────────────── */
.hg-name-input {
  background: transparent;
  border: none;
  border-bottom: 1px dashed transparent;
  outline: none;
  font-family: var(--display);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--ink);
  padding: 0;
  width: auto;
  min-width: 60px;
  max-width: 220px;
  cursor: text;
  transition: border-color 0.15s;
}
.hg-name-input:hover,
.hg-name-input:focus {
  border-bottom-color: var(--rule-gold);
}

/* ── Henchman "Hire More" button ─────────────────────────────────── */
.btn.sm.hg-hire-more {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 9px;
  border-color: var(--rule-gold);
  color: var(--candle);
  background: transparent;
  flex-shrink: 0;
}
.btn.sm.hg-hire-more:hover {
  background: rgba(212, 160, 74, 0.12);
}

/* ── Spellbook modal ─────────────────────────────────────────────── */
.spellbook-modal {
  max-width: 680px;
}

.spell-school-tag {
  display: inline-block;
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  color: #b49dd4;
  letter-spacing: 0.04em;
}

.spell-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 10px;
  margin: 20px 0 10px;
}

.spell-tile {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 14px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.spell-tile:hover {
  border-color: #7b5ea7;
  background: rgba(123, 94, 167, 0.08);
}
.spell-tile.known {
  border-color: #7b5ea7;
  background: rgba(123, 94, 167, 0.15);
}

.spell-tile-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.spell-tile-name {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.spell-known-badge {
  font-family: var(--serif);
  font-size: 11px;
  font-style: italic;
  color: #b49dd4;
  background: rgba(123, 94, 167, 0.25);
  border: 1px solid #7b5ea7;
  border-radius: 10px;
  padding: 1px 8px;
  white-space: nowrap;
  flex-shrink: 0;
}

.spell-meta-row {
  display: flex;
  gap: 12px;
  align-items: center;
}
.spell-cast {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--candle-bright);
  font-weight: 600;
}
.spell-range {
  font-family: var(--serif);
  font-size: 12px;
  color: var(--ink-dim);
  font-style: italic;
}

.spell-tile-desc {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--ink-dim);
  line-height: 1.45;
}

.spellbook-note {
  font-family: var(--serif);
  font-size: 13px;
  font-style: italic;
  text-align: center;
  margin: 4px 0 0;
}

@media (max-width: 600px) {
  .spell-grid { grid-template-columns: 1fr; }
  .hg-name-input { max-width: 160px; }
}

/* ── Hired Swords ─────────────────────────────────────────── */

/* Hired Sword button (bottom of roster) */
.btn.hs-btn {
  background: linear-gradient(160deg, #1e1530 0%, #150f23 100%);
  border: 1px solid #6b3fa0;
  color: #c0a0f0;
  font-family: var(--display);
  letter-spacing: 0.04em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn.hs-btn:hover {
  background: linear-gradient(160deg, #2a1e42 0%, #1c1330 100%);
  border-color: #9060d0;
  color: #d8bcff;
}

/* Dramatis Personae button (bottom of roster) */
.btn.dp-btn {
  background: linear-gradient(160deg, #1a1510 0%, #120e08 100%);
  border: 1px solid #8a6820;
  color: #d4a843;
  letter-spacing: 0.04em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn.dp-btn:hover {
  background: linear-gradient(160deg, #261e0e 0%, #1a1409 100%);
  border-color: #c49030;
  color: #f0c060;
}

/* ── Warband Stockpile button ── */
.btn.sp-btn {
  background: linear-gradient(160deg, #0e1610 0%, #080e09 100%);
  border: 1px solid #3a6040;
  color: #80c890;
  font-family: var(--display);
  letter-spacing: 0.04em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn.sp-btn:hover {
  background: linear-gradient(160deg, #152218 0%, #0e1710 100%);
  border-color: #5a9060;
  color: #a0e0a8;
}

/* ── Stockpile modal ── */
.stockpile-modal { max-width: 560px; }

.stockpile-list {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 16px;
  max-height: 60vh; overflow-y: auto;
  padding-right: 2px;
}

.stockpile-item-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; padding: 13px 16px;
  background: var(--bg-2); border: 1px solid var(--rule-bright);
  flex-wrap: wrap;
  transition: border-color 200ms;
}
.stockpile-item-row:hover { border-color: var(--rule-gold); }

.stockpile-item-info {
  display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0;
}
.stockpile-item-name {
  font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--candle);
}
.stockpile-item-paid {
  font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.stockpile-item-actions {
  display: flex; gap: 8px; flex-shrink: 0;
}

/* ── Trading Post button ── */
.btn.tp-btn {
  background: linear-gradient(160deg, #1a180a 0%, #110f04 100%);
  border: 1px solid var(--rule-gold);
  color: var(--candle);
  font-family: var(--display);
  letter-spacing: 0.04em;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn.tp-btn:hover {
  background: linear-gradient(160deg, #2a2410 0%, #1c1808 100%);
  border-color: var(--candle);
  color: var(--candle-bright);
}

/* ── Trading Post modal ── */
.tp-modal { max-width: 760px; }

/* Trading Post availability badges — used in tiles and detail dialog */
.tp-avail {
  font-size: 10px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
  display: inline-block;
}
.tp-avail-common {
  background: rgba(80,140,80,0.25);
  border: 1px solid #407040;
  color: #90c890;
}
.tp-avail-rare {
  background: rgba(180,120,30,0.2);
  border: 1px solid var(--rule-gold);
  color: var(--candle);
}

/* Trading Post eq-tile variant */
.tp-tile { align-items: flex-start; padding: 10px 14px; }
.tp-tile-left {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 5px;
}
.tp-tile.tp-tile-restricted { opacity: 0.45; }
.tp-tile-status {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase;
}
.tp-tile-broke-cost { color: var(--blood-bright) !important; }

/* ── Trading Post collapsible section headers ── */
.tp-section-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 10px 4px 8px;
  background: none; border: none; border-bottom: 1px solid var(--rule-bright);
  cursor: pointer; margin-top: 20px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim);
  transition: color 200ms, border-color 200ms;
}
.tp-section-header:hover { color: var(--candle); border-color: var(--rule-gold); }
.tp-chevron {
  font-size: 18px; line-height: 1; color: var(--ink-faint);
  transition: transform 220ms ease, color 200ms;
  transform: rotate(0deg);
  display: inline-block;
}
.tp-chevron-open { transform: rotate(90deg); color: var(--rule-gold); }
.tp-section-grid { margin-top: 10px; }

/* ── Assign-item modal ── */
.assign-card { max-width: 400px; width: 92vw; }

.assign-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 52vh;
  overflow-y: auto;
  margin-bottom: 4px;
}

.assign-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg-3);
  border: 1px solid var(--rule-bright);
  border-radius: 4px;
  cursor: pointer;
  text-align: left;
  transition: background 0.12s, border-color 0.12s;
  width: 100%;
}
.assign-row:hover {
  background: var(--bg-card-top);
  border-color: var(--rule-gold);
}
.assign-row-stockpile {
  border-color: var(--candle-dim);
  background: linear-gradient(135deg, #1a1508 0%, #0e0a04 100%);
}
.assign-row-stockpile:hover {
  border-color: var(--candle);
  background: linear-gradient(135deg, #252010 0%, #151208 100%);
}
.assign-icon { font-size: 18px; flex-shrink: 0; }
.assign-text { display: flex; flex-direction: column; gap: 1px; }
.assign-name { font-size: 13px; font-weight: 600; color: var(--bone); }
.assign-sub  { font-size: 11px; color: var(--ink-dim); font-style: italic; }

.assign-sep {
  text-align: center;
  font-size: 11px;
  color: var(--ink-faint);
  padding: 4px 0;
  letter-spacing: 0.5px;
}

/* ── Stockpile in EquipModal ── */
.stockpile-title {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.stockpile-subtitle {
  font-size: 11px;
  font-weight: normal;
  color: var(--ink-faint);
  font-style: italic;
  text-transform: none;
  letter-spacing: normal;
}
.gear-pill.stockpile-pill {
  border-color: var(--candle-dim);
  color: var(--candle);
}
.gear-pill.stockpile-pill:hover { border-color: var(--candle); }
.stockpile-take {
  color: #80c880;
  font-size: 13px;
  font-weight: bold;
}
.stockpile-take:hover { color: #a0e8a0; }

/* Badge on the warrior card */
.hired-sword-badge {
  display: inline-block;
  background: #2a1545;

  padding: 1px 6px;

  font-size: 12px;

  gap: 4px;

/* Equipment line */

  font-family: var(--serif);
