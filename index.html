// ---------- Campaign Banner ----------
function CampaignBanner({ session, sigmarMode, onLeave }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(session.code).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }).catch(() => {});
    }
  };
  return (
    <div className={`campaign-banner${sigmarMode ? " sigmar-mode-banner" : ""}`}>
      <div className="campaign-info">
        <span className="campaign-label">Campaign</span>
        <span className="campaign-name">{session.name}</span>
        <button className="campaign-code-btn" onClick={copy} title="Click to copy join code">
          {session.code}
          <span className="campaign-code-icon">{copied ? "✓" : "⊞"}</span>
        </button>
        {sigmarMode && <span className="sigmar-banner-tag">⚔ Sigmar Mode</span>}
      </div>
      <button className="btn ghost btn-sm" onClick={onLeave}>Leave</button>
    </div>
  );
}

// ---------- Campaign Lobby modal ----------
function CampaignLobby({ onClose, onCreate, onJoin }) {
  const [tab, setTab]   = useState("create");
  const [name, setName] = useState("");
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  const switchTab = (t) => { setTab(t); setError(""); };

  const handleCreate = async () => {
    if (!name.trim()) { setError("Please enter a campaign name."); return; }
    setBusy(true); setError("");
    try {
      await onCreate(name.trim());
      onClose();
    } catch (e) {
      setError("Could not create campaign. Check your connection and try again.");
    } finally { setBusy(false); }
  };

  const handleJoin = async () => {
    const c = code.trim().toUpperCase();
    if (c.length !== 6) { setError("Please enter a 6-character campaign code."); return; }
    setBusy(true); setError("");
    try {
      await onJoin(c);
      onClose();
    } catch (e) {
      setError(e.message || "Campaign not found. Double-check the code.");
    } finally { setBusy(false); }
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Campaign Roster</h2>
        <p className="epigraph muted" style={{ textAlign: "center", marginBottom: 4 }}>
          Share your warband roster with allies across Mordheim.
        </p>
        <div className="lobby-tabs">
          <button className={`lobby-tab${tab === "create" ? " active" : ""}`} onClick={() => switchTab("create")}>
            Create
          </button>
          <button className={`lobby-tab${tab === "join" ? " active" : ""}`} onClick={() => switchTab("join")}>
            Join
          </button>
        </div>

        {tab === "create" && (
          <React.Fragment>
            <div className="field">
              <label>Campaign Name</label>
              <input autoFocus value={name} onChange={e => setName(e.target.value)}
                     placeholder="e.g. The Autumn Siege, Shattered Crown Campaign"
                     onKeyDown={e => e.key === "Enter" && handleCreate()} />
            </div>
            <p style={{ fontSize: "0.83rem", color: "var(--ink-faint)", marginTop: 8, fontStyle: "italic" }}>
              You'll receive a 6-letter code to share with allies.
            </p>
            {error && <div className="lobby-error">{error}</div>}
            <div className="row" style={{ justifyContent: "flex-end", marginTop: 20 }}>
              <button className="btn primary" onClick={handleCreate} disabled={busy}>
                {busy ? "Creating…" : "Create Campaign"}
              </button>
            </div>
          </React.Fragment>
        )}

        {tab === "join" && (
          <React.Fragment>
            <div className="field">
              <label>Campaign Code</label>
              <input autoFocus value={code}
                     onChange={e => setCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ""))}
                     placeholder="XXXXXX" maxLength={6}
                     style={{ fontFamily: "var(--mono)", fontSize: "1.3rem", letterSpacing: "0.2em" }}
                     onKeyDown={e => e.key === "Enter" && handleJoin()} />
            </div>
            <p style={{ fontSize: "0.83rem", color: "var(--ink-faint)", marginTop: 8, fontStyle: "italic" }}>
              Ask your campaign organiser for the 6-character code.
            </p>
            {error && <div className="lobby-error">{error}</div>}
            <div className="row" style={{ justifyContent: "flex-end", marginTop: 20 }}>
              <button className="btn primary" onClick={handleJoin} disabled={busy}>
                {busy ? "Joining…" : "Join Campaign"}
              </button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

// ---------- app root ----------
function App() {
  // ── offline state ──
  const [state, setState] = useState(loadState); // { warbands: [], theme: "dark" }

  // ── campaign session (persisted to localStorage via MF) ──
  const [session, setSession] = useState(() => MF ? MF.loadSession() : null);
  // { code: "ABC123", name: "Campaign Name", ownerTokens: { [wbId]: token } }

  // ── live Firestore warbands ──
  const [campaignWarbands, setCampaignWarbands] = useState(null); // null = not yet loaded
  const [campaignLoading, setCampaignLoading]   = useState(false);
  const [campaignError, setCampaignError]       = useState(null);

  const [lobbyOpen, setLobbyOpen]   = useState(false);
  const [syncError, setSyncError]   = useState(null); // non-null = last sync error message
  const [sigmarMode, setSigmarMode] = useState(false); // secret admin mode
  const [page, setPage]             = useState({ name: "home" });
  const [tweaks, setTweak]          = window.useTweaks();
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Refs for debounced Firestore sync
  const dirtyIds   = useRef(new Set()); // warbands with unsaved local changes
  const syncTimers = useRef({});        // setTimeout handles keyed by warband id

  const inCampaign = !!session && !!MF;

  // The canonical warband list shown to the user
  const warbands = inCampaign ? (campaignWarbands || []) : state.warbands;

  // Does the current user own this warband? Sigmar Mode grants ownership of everything.
  const isOwner = useCallback((wbId) => {
    if (sigmarMode) return true;
    if (!inCampaign) return true;
    return !!(session.ownerTokens && session.ownerTokens[wbId] !== undefined);
  }, [sigmarMode, inCampaign, session]);

  // ── Subscribe to Firestore when campaign session exists ──
  useEffect(() => {
    if (!session || !MF) { setCampaignWarbands(null); return; }
    setCampaignLoading(true);
    setCampaignError(null);
    const unsub = MF.subscribeToCampaign(
      session.code,
      wbs => {
        setCampaignLoading(false);
        setCampaignWarbands(prev =>
          // Keep locally-edited version for any warband currently being synced
          wbs.map(wb =>
            dirtyIds.current.has(wb.id)
              ? ((prev || []).find(p => p.id === wb.id) || wb)
              : wb
          )
        );
      },
      err => {
        setCampaignLoading(false);
        setCampaignError("Lost connection to campaign. " + err.message);
      }
    );
    return unsub;
  }, [session ? session.code : null]);

  // ── Persist offline state ──
  useEffect(() => { saveState(state); }, [state]);

  // ── Persist campaign session ──
  useEffect(() => {
    if (!MF) return;
    if (session) MF.saveSession(session);
    else MF.clearSession();
  }, [session]);

  // ── Theme ──
  useEffect(() => {
    document.documentElement.dataset.theme = state.theme;
    document.body.dataset.theme = state.theme;
  }, [state.theme]);

  // ── Edit-mode protocol ──
  useEffect(() => {
    function onMsg(e) {
      if (!e.data) return;
      if (e.data.type === "__activate_edit_mode")   setTweaksOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
    }
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const closeTweaks = () => {
    setTweaksOpen(false);
    window.parent.postMessage({ type: "__edit_mode_dismissed" }, "*");
  };

  const toggleTheme = () => setState(s => ({ ...s, theme: s.theme === "dark" ? "light" : "dark" }));

  // ── Warband CRUD ──

  const addWarband = (wb) => {
    if (inCampaign) {
      const token = uid();
      const wbWithToken = { ...wb, ownerToken: token };
      // Optimistic local add
      setCampaignWarbands(prev => [...(prev || []), wbWithToken]);
      dirtyIds.current.add(wb.id);
      setSession(prev => ({
        ...prev,
        ownerTokens: { ...(prev.ownerTokens || {}), [wb.id]: token },
      }));
      // Async Firestore save
      MF.saveWarband(session.code, wbWithToken)
        .then(() => dirtyIds.current.delete(wb.id))
        .catch(e => alert("Could not save warband to campaign: " + e.message));
    } else {
      setState(s => ({ ...s, warbands: [...s.warbands, wb] }));
    }
    setPage({ name: "roster", id: wb.id });
  };

  const addImportedWarbands = (wbs) => {
    if (inCampaign) {
      const newTokens = {};
      const wbsWithTokens = wbs.map(wb => {
        const token = uid();
        newTokens[wb.id] = token;
        return { ...wb, ownerToken: token };
      });
      setCampaignWarbands(prev => [...(prev || []), ...wbsWithTokens]);
      setSession(prev => ({
        ...prev,
        ownerTokens: { ...(prev.ownerTokens || {}), ...newTokens },
      }));
      wbsWithTokens.forEach(wb => {
        dirtyIds.current.add(wb.id);
        MF.saveWarband(session.code, wb)
          .then(() => dirtyIds.current.delete(wb.id))
          .catch(e => console.warn("Import sync failed:", e));
      });
      if (wbs.length === 1) setPage({ name: "roster", id: wbs[0].id });
    } else {
      setState(s => ({ ...s, warbands: [...s.warbands, ...wbs] }));
      if (wbs.length === 1) setPage({ name: "roster", id: wbs[0].id });
    }
  };

  const deleteWarband = (id) => {
    if (!confirm("Disband this warband? This cannot be undone.")) return;
    if (inCampaign) {
      // Optimistic removal
      setCampaignWarbands(prev => prev ? prev.filter(w => w.id !== id) : prev);
      setSession(prev => {
        const tokens = { ...(prev.ownerTokens || {}) };
        delete tokens[id];
        return { ...prev, ownerTokens: tokens };
      });
      MF.deleteWarband(session.code, id)
        .catch(e => alert("Could not delete warband: " + e.message));
    } else {
      setState(s => ({ ...s, warbands: s.warbands.filter(w => w.id !== id) }));
    }
    if (page.name === "roster" && page.id === id) setPage({ name: "home" });
  };

  const updateWarband = (id, updater) => {
    if (inCampaign) {
      setCampaignWarbands(prev => {
        if (!prev) return prev;
        const wb = prev.find(w => w.id === id);
        if (!wb) return prev;
        const updated = updater(wb);
        // Mark dirty and schedule debounced sync
        dirtyIds.current.add(id);
        clearTimeout(syncTimers.current[id]);
        const codeAtEdit = session.code;
        syncTimers.current[id] = setTimeout(() => {
          MF.saveWarband(codeAtEdit, updated)
            .then(() => { dirtyIds.current.delete(id); setSyncError(null); })
            .catch(e => {
              dirtyIds.current.delete(id);
              setSyncError("Sync failed — changes may not be saved: " + e.message);
              console.warn("Firestore sync failed:", e);
            });
        }, 800);
        return prev.map(w => w.id === id ? updated : w);
      });
    } else {
      setState(s => ({ ...s, warbands: s.warbands.map(w => w.id === id ? updater(w) : w) }));
    }
  };

  // ── Campaign management ──

  const handleCreateCampaign = async (name) => {
    const code = await MF.createCampaign(name);
    setSession({ code, name, ownerTokens: {} });
  };

  const handleJoinCampaign = async (code) => {
    const campaign = await MF.getCampaign(code);
    if (!campaign) throw new Error("Campaign not found. Check the code and try again.");
    setSession({ code: campaign.code, name: campaign.name, ownerTokens: {} });
  };

  const handleLeaveCampaign = () => {
    if (!confirm("Leave this campaign? You can rejoin later with the same code. Your warbands will remain visible to the group.")) return;
    setSession(null);
    setCampaignWarbands(null);
    setPage({ name: "home" });
  };

  const current = page.name === "roster" ? warbands.find(w => w.id === page.id) : null;

  return (
    <React.Fragment>
      <Atmosphere />
      <div className="app">
        <header className="brand">
          <div className="brand-mark">
            <FlameGlyph />
            <div>
              <div className="brand-title">Mordheim</div>
              <div className="brand-subtitle">A roster of those who walk the City of the Damned</div>
            </div>
          </div>
          <button className="theme-toggle" onClick={toggleTheme} title="Toggle theme">
            {state.theme === "dark" ? "Light Candles" : "Snuff Candles"}
          </button>
        </header>

        {syncError && (
          <div className="sync-error-bar" onClick={() => setSyncError(null)} title="Click to dismiss">
            ⚠ {syncError}
          </div>
        )}

        {page.name === "home" && (
          <Home warbands={warbands}
                session={session}
                inCampaign={inCampaign}
                campaignLoading={campaignLoading}
                campaignError={campaignError}
                isOwner={isOwner}
                hasCampaignFeature={!!MF}
                sigmarMode={sigmarMode}
                onActivateSigmar={() => setSigmarMode(true)}
                onDeactivateSigmar={() => setSigmarMode(false)}
                onOpen={id => setPage({ name: "roster", id })}
                onNew={() => setPage({ name: "new" })}
                onDelete={deleteWarband}
                onExport={exportWarband}
                onExportAll={() => exportAllWarbands(warbands)}
                onImport={() => importWarbands(addImportedWarbands)}
                onOpenLobby={() => setLobbyOpen(true)}
                onLeaveCampaign={handleLeaveCampaign} />
        )}
        {page.name === "new" && (
          <NewWarband onCancel={() => setPage({ name: "home" })} onCreate={addWarband} />
        )}
        {current && (
          <Roster warband={current}
                  onBack={() => setPage({ name: "home" })}
                  update={(updater) => updateWarband(current.id, updater)}
                  onExport={() => exportWarband(current)} />
        )}
      </div>

      {lobbyOpen && MF && (
        <CampaignLobby
          onClose={() => setLobbyOpen(false)}
          onCreate={handleCreateCampaign}
          onJoin={handleJoinCampaign}
        />
      )}

      <window.TweaksPanel open={tweaksOpen} onClose={closeTweaks} t={tweaks} setTweak={setTweak} />
    </React.Fragment>
  );
}

// ---------- home ----------
function Home({ warbands, session, inCampaign, campaignLoading, campaignError, isOwner,
                hasCampaignFeature, sigmarMode, onActivateSigmar, onDeactivateSigmar,
                onOpen, onNew, onDelete, onExport, onExportAll,
                onImport, onOpenLobby, onLeaveCampaign }) {
  const [iconClicks, setIconClicks] = useState(0);
  const clickTimer = useRef(null);

  const handleIconClick = () => {
    clearTimeout(clickTimer.current);
    const next = iconClicks + 1;
    if (next >= 5) {
      sigmarMode ? onDeactivateSigmar() : onActivateSigmar();
      setIconClicks(0);
    } else {
      setIconClicks(next);
      // Reset click count if no further clicks within 3 seconds
      clickTimer.current = setTimeout(() => setIconClicks(0), 3000);
    }
  };

  return (
    <React.Fragment>
      {inCampaign && session && (
        <CampaignBanner session={session} sigmarMode={sigmarMode} onLeave={onLeaveCampaign} />
      )}
      <div className="page-heading">
        <h1>The Warbands</h1>
        <div className="home-io-bar">
          {hasCampaignFeature && !inCampaign && (
            <button className="btn ghost btn-sm campaign-join-btn" onClick={onOpenLobby}
                    title="Create or join a shared campaign with allies">
              ⚔ Campaign
            </button>
          )}
          <button className="btn ghost btn-sm" onClick={onImport} title="Load warbands from a .mordheim.json file">↑ Import</button>
          {warbands.length > 0 && !inCampaign && (
            <button className="btn ghost btn-sm" onClick={onExportAll} title="Save all warbands to a single JSON file">↓ Export All</button>
          )}
        </div>
        <div className="divider sigmar-icon-wrap" onClick={handleIconClick} title="">
          {sigmarMode
            ? <Warhammer />
            : <svg viewBox="0 0 24 24"><Skull /></svg>
          }
        </div>
        {sigmarMode && (
          <div className="sigmar-mode-msg">⚔ Sigmar Mode Activated ⚔</div>
        )}
        <p className="epigraph">"The night belongs to those bold enough to claim it."</p>
      </div>

      {campaignError && (
        <div className="lobby-error" style={{ marginBottom: 16 }}>{campaignError}</div>
      )}

      {campaignLoading && !warbands.length ? (
        <div className="empty">
          <div className="big" style={{ color: "var(--ink-dim)" }}>Summoning the warbands…</div>
        </div>
      ) : warbands.length === 0 ? (
        <div className="empty">
          <div className="big">No warbands stir in the ruins</div>
          <p>{inCampaign
            ? "No warbands have yet mustered for this campaign. Be the first to light a lantern."
            : "Light a lantern, draw your blade, and recruit the desperate few who would dare the dead city."}</p>
          <div style={{ marginTop: 30, display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
            <button className="btn primary" onClick={onNew}>+ Muster a Warband</button>
            {!inCampaign && <button className="btn ghost" onClick={onImport}>↑ Import Warband</button>}
          </div>
        </div>
      ) : (
        <div className="warband-grid">
          {warbands.map((w, i) => (
            <WarbandCard key={w.id} wb={w} idx={i}
              inCampaign={inCampaign}
              mine={isOwner(w.id)}
              sigmarMode={sigmarMode}
              onOpen={() => onOpen(w.id)}
              onDelete={() => onDelete(w.id)}
              onExport={() => onExport(w)} />
          ))}
          <button className="wb-card add" onClick={onNew}>
            <div className="plus">+</div>
            <div className="label">Muster a New Warband</div>
          </button>
        </div>
      )}
    </React.Fragment>
  );
}

  const def = MM.WARBANDS[wb.faction];
  const warriorCount = wb.warriors.length;
  return (
    <div className={`wb-card${inCampaign && !mine ? " wb-card-allied" : ""}`}
         onClick={onOpen}
         style={{ animationDelay: (idx * 60) + "ms" }}>
      <span className="wb-card-corner tl"></span>
      <span className="wb-card-corner tr"></span>
      <span className="wb-card-corner bl"></span>
      <span className="wb-card-corner br"></span>
      {inCampaign && (
        <div className={`wb-owner-badge ${mine && !sigmarMode ? "mine" : mine ? "mine" : sigmarMode ? "sigmar-admin" : "allied"}`}>
          {mine ? "⚔ Yours" : sigmarMode ? "⚔ Admin" : "👁 Allied"}
        </div>
      )}
      <div className="group-tag">{def.group}</div>
      <h3>{wb.name}</h3>
      <div className="wb-leader">{def.name} · led by <em>{wb.warriors.find(x => x.role === "Hero")?.name || "(unnamed)"}</em></div>
      <div className="wb-stats">
        <div className="wb-stat gold"><span className="v">{wb.gold}</span><span className="l">Gold</span></div>
        <div className="wb-stat"><span className="v">{wb.wyrdstone}</span><span className="l">Shards</span></div>
        <div className="wb-stat"><span className="v">{warriorCount}</span><span className="l">Warriors</span></div>
      </div>
      <div className="wb-actions">
        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
          {mine && (
            <button className="wb-delete" onClick={e => { e.stopPropagation(); onDelete(); }}>Disband</button>
          )}
          <button className="wb-export" onClick={e => { e.stopPropagation(); onExport(); }} title="Save this warband to a JSON file">Export</button>
        </div>
        <span className="open-cue">Enter Roster <span>→</span></span>
      </div>
    </div>
  );
}

// ---------- new warband ----------
function NewWarband({ onCancel, onCreate }) {
  const [step, setStep] = useState("faction"); // 'faction' | 'name'
  const [faction, setFaction] = useState(null);
  const [name, setName] = useState("");

  const create = () => {
    const def = MM.WARBANDS[faction];
    const finalName = name.trim() || `The ${def.name} of ${["Drakwald","Reikwald","Sylvania","Stir","Hochland"][Math.floor(Math.random()*5)]}`;
    onCreate({
      id: uid(),
      name: finalName,
      faction,
      gold: def.startGold,
      wyrdstone: 0,
      warriors: [],
      stockpile: [],
      createdAt: Date.now(),
    });
  };

  const grouped = useMemo(() => {
    const g = {};
    Object.values(MM.WARBANDS).forEach(w => { (g[w.group] = g[w.group] || []).push(w); });
    return g;
  }, []);

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onCancel}>✕</button>
        {step === "faction" && (
          <React.Fragment>
            <h2>Choose Thy Allegiance</h2>
            <p className="epigraph muted" style={{textAlign:"center"}}>Each pact carries its own price.</p>
            {Object.entries(grouped).map(([gname, list]) => (
              <div key={gname} style={{ marginTop: 26 }}>
                <div className="eq-section-title">{gname}</div>
                <div className="group-grid">
                  {list.map(w => (
                    <button key={w.id} className="group-tile" onClick={() => { setFaction(w.id); setStep("name"); }}>
                      <div className="gt-group">{w.startGold}gc · max {w.maxWarriors}</div>
                      <div className="gt-name">{w.name}</div>
                      <div className="gt-flavor">{w.flavor}</div>
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </React.Fragment>
        )}
        {step === "name" && (
          <React.Fragment>
            <h2>Name Thy Warband</h2>
            <p className="epigraph muted" style={{textAlign:"center"}}>A banner to be sung — or cursed.</p>
            <div className="lore-block" style={{marginTop: 22}}>
              <div className="l-title">{MM.WARBANDS[faction].group} — {MM.WARBANDS[faction].name}</div>
              <ul>
                {MM.WARBANDS[faction].special.map((s,i) => <li key={i}>{s}</li>)}
              </ul>
            </div>
            <div className="field">
              <label>Warband Name</label>
              <input autoFocus value={name} onChange={e => setName(e.target.value)}
                     placeholder="e.g. The Black Coach, The Carrion Choir, Hessler's Hounds"
                     onKeyDown={e => e.key === "Enter" && create()} />
            </div>
            <div className="row" style={{justifyContent:"space-between", marginTop: 20}}>
              <button className="btn ghost" onClick={() => setStep("faction")}>← Choose Again</button>
              <button className="btn primary" onClick={create}>Forge the Warband</button>
            </div>
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

window.Mordheim_App = App;

</script>
