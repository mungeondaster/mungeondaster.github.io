<script>
/* firebase.js — Mordheim Warband Tracker — campaign sync via Firestore */
(function () {
  const CFG = {
    apiKey:            "AIzaSyBfGEo9kGCEHpIluKazrzlRfQ8x65Yh_jo",
    authDomain:        "mordheim-tracker-ac042.firebaseapp.com",
    projectId:         "mordheim-tracker-ac042",
    storageBucket:     "mordheim-tracker-ac042.firebasestorage.app",
    messagingSenderId: "1051977207265",
    appId:             "1:1051977207265:web:cece0cc0af6234c27356a0",
  };

  let _db = null;
  function getDb() {
    if (_db) return _db;
    try { firebase.app(); } catch (_) { firebase.initializeApp(CFG); }
    _db = firebase.firestore();
    return _db;
  }

  const SESSION_KEY = "mordheim_campaign_v1";
  const CHARS       = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no ambiguous chars

  function generateCode() {
    let s = "";
    for (let i = 0; i < 6; i++) s += CHARS[Math.floor(Math.random() * CHARS.length)];
    return s;
  }

  function loadSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)) || null; }
    catch (_) { return null; }
  }
  function saveSession(s) {
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); } catch (_) {}
  }
  function clearSession() {
    try { localStorage.removeItem(SESSION_KEY); } catch (_) {}
  }

  // Create a new campaign doc; returns the 6-char code
  async function createCampaign(name) {
    const code = generateCode();
    await getDb().collection("campaigns").doc(code).set({
      name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    return code;
  }

  // Fetch campaign metadata — returns { code, name } or null if not found
  async function getCampaign(code) {
    const snap = await getDb()
      .collection("campaigns")
      .doc(code.toUpperCase())
      .get();
    if (!snap.exists) return null;
    return { code: snap.id, name: snap.data().name };
  }

  // Subscribe to all warbands in a campaign — returns unsubscribe fn
  function subscribeToCampaign(code, onUpdate, onErr) {
    return getDb()
      .collection("campaigns").doc(code)
      .collection("warbands")
      .onSnapshot(
        snap => {
          const wbs = [];
          snap.forEach(d => wbs.push({ id: d.id, ...d.data() }));
          onUpdate(wbs);
        },
        err => { if (onErr) onErr(err); }
      );
  }

  // Upsert a warband document (id is stripped, used as doc key).
  // JSON round-trip strips `undefined` values — Firestore rejects them and
  // warriors created from unit definitions often carry `note: undefined`, etc.
  async function saveWarband(code, warband) {
    const { id, ...data } = warband;
    const clean = JSON.parse(JSON.stringify(data));
    await getDb()
      .collection("campaigns").doc(code)
      .collection("warbands").doc(id)
      .set(clean);
  }

  // Delete a warband document
  async function deleteWarband(code, wbId) {
    await getDb()
      .collection("campaigns").doc(code)
      .collection("warbands").doc(wbId)
      .delete();
  }

  window.MordheimFirebase = {
    generateCode,
    loadSession, saveSession, clearSession,
    createCampaign, getCampaign, subscribeToCampaign,
    saveWarband, deleteWarband,
  };
})();

</script>

<script type="text/babel">
/* Mordheim Tweaks Panel - controls atmosphere, density, accents */
const { useState: useStateT, useEffect: useEffectT } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "atmosphere": 1.0,
  "density": "comfortable",
  "accent": "candle"
}/*EDITMODE-END*/;

const ACCENT_PRESETS = {
  candle:  { candle: "0.84 0.14 78",  candleDim: "0.62 0.12 72", candleBright: "0.90 0.15 82" },
  emerald: { candle: "0.78 0.14 155", candleDim: "0.56 0.12 155", candleBright: "0.84 0.16 155" },
  azure:   { candle: "0.78 0.12 230", candleDim: "0.56 0.10 230", candleBright: "0.84 0.14 230" },
  rose:    { candle: "0.78 0.13 10",  candleDim: "0.56 0.11 10",  candleBright: "0.84 0.15 10" },
};

function applyTweaks(t) {
  const r = document.documentElement;
  r.style.setProperty("--atm", String(t.atmosphere));
  const a = ACCENT_PRESETS[t.accent] || ACCENT_PRESETS.candle;
  r.style.setProperty("--candle", `oklch(${a.candle})`);
  r.style.setProperty("--candle-dim", `oklch(${a.candleDim})`);
  r.style.setProperty("--candle-bright", `oklch(${a.candleBright})`);
  // density: tap target / spacing knob
  const d = t.density;
  r.style.setProperty("--tap", d === "tight" ? "40px" : d === "roomy" ? "52px" : "44px");
  document.body.dataset.density = d;
}

function useTweaks() {
  const [t, setT] = useStateT(() => {
    try { return { ...TWEAK_DEFAULTS, ...(JSON.parse(localStorage.getItem("mordheim_tweaks") || "{}")) }; }
    catch { return TWEAK_DEFAULTS; }
  });
  useEffectT(() => {
    applyTweaks(t);
    try { localStorage.setItem("mordheim_tweaks", JSON.stringify(t)); } catch {}
  }, [t]);
  const setTweak = (k, v) => setT(prev => ({ ...prev, [k]: v }));
  return [t, setTweak];
}

function TweaksPanel({ open, onClose, t, setTweak }) {
  if (!open) return null;
  return (
    <div className="tweaks-panel">
      <div className="tw-title">
        <span>Tweaks</span>
        <button className="tw-close" onClick={onClose} aria-label="Close">✕</button>
      </div>
      <div className="tw-row">
        <label>Atmosphere <span className="tw-v">{Math.round(t.atmosphere * 100)}%</span></label>
        <input type="range" min="0" max="1.2" step="0.05"
               value={t.atmosphere}
               onChange={e => setTweak("atmosphere", parseFloat(e.target.value))} />
      </div>
      <div className="tw-row">
        <label>Density</label>
        <div className="tw-swatch-row" style={{display:"flex", gap:6}}>
          {["tight","comfortable","roomy"].map(d => (
            <button key={d}
                    onClick={() => setTweak("density", d)}
                    className={"btn sm" + (t.density === d ? "" : " ghost")}
                    style={{flex:1, padding:"6px 4px", fontSize:9.5, letterSpacing:"0.14em", minHeight:34}}>
              {d}
            </button>
          ))}
        </div>
      </div>
      <div className="tw-row">
        <label>Accent</label>
        <div className="tw-swatch-row">
          {Object.entries(ACCENT_PRESETS).map(([k, v]) => (
            <button key={k}
                    onClick={() => setTweak("accent", k)}
                    title={k}
                    className={"tw-swatch" + (t.accent === k ? " active" : "")}
                    style={{ background: `oklch(${v.candle})` }} />
          ))}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, applyTweaks, TWEAK_DEFAULTS });

</script>
<script type="text/babel">
/* Roster view + recruit + equipment */
const { useState: useStateR, useMemo: useMemoR, useRef: useRefR, useEffect: useEffectR } = React;
const MR = window.MORDHEIM;

// === Rich tooltip ============================================
function Tip({ content, children, className = "", as = "span", ...rest }) {
  if (!content) return React.createElement(as, { className, ...rest }, children);
  return React.createElement(as, { className: className + " tip-wrap", ...rest },
    children,
    React.createElement("span", { className: "tip-box", role: "tooltip" }, content)
  );
}

function typeLabel(t) { /* deprecated — tooltips no longer show type label */ return ""; }

function Stat({ label, value }) {
  return (
    <div className="tip-stat">
      <span className="tip-stat-l">{label}</span>
      <span className="tip-stat-v">{value}</span>
    </div>
  );
}

function RuleBlock({ name, desc }) {
  return (
    <div className="tip-rule">
      <div className="tip-rule-name">▸ {name}</div>
      <div className="tip-rule-desc">{desc}</div>
    </div>
  );
}

// Build the rich tooltip content for a piece of equipment.
// Tooltips show ONLY play-essential info: stats (range/str/saves) and special rules.
function gearTip(key) {
  const it = MR.EQUIP[key];
  if (!it) return null;
  const s = it.stats || {};
  const hasStats = s.range !== undefined || s.str !== undefined || s.saveMod !== undefined || s.save !== undefined;
  const hasRules = it.special && it.special.length > 0;
  if (!hasStats && !hasRules) {
    return (
      <React.Fragment>
        <div className="tip-title tip-title-solo">{it.name}</div>
      </React.Fragment>
    );
  }
  return (
    <React.Fragment>
      <div className="tip-title">{it.name}</div>
      {hasStats && (
        <div className="tip-stats">
          {s.range !== undefined && <Stat label="Range" value={s.range} />}
          {s.str !== undefined && <Stat label="Strength" value={s.str} />}
          {s.saveMod !== undefined && <Stat label="Save mod" value={s.saveMod} />}
          {s.save !== undefined && <Stat label="Armour save" value={s.save} />}
        </div>
      )}
      {hasRules && (
        <div className="tip-rules">
          {it.special.map(rk => {
            const r = MR.RULES[rk];
            if (!r) return null;
            return <RuleBlock key={rk} name={r.name} desc={r.desc} />;
          })}
        </div>
      )}
    </React.Fragment>
  );
}

// Build tooltip for a unit/warrior rule — just name + description.
function ruleTip(ruleName) {
  const r = MR.RULES[ruleName];
  if (!r) return <span>{ruleName}</span>;
  return (
    <React.Fragment>
      <div className="tip-title">{r.name}</div>
      <div className="tip-rule-desc tip-rule-desc-solo">{r.desc}</div>
    </React.Fragment>
  );
}

// Build tooltip for a mutation — name + description.
function mutationTip(mKey) {
  const m = MR.MUTATIONS[mKey];
  if (!m) return null;
  return (
    <React.Fragment>
      <div className="tip-title">☩ {m.name}</div>
      <div className="tip-rule-desc tip-rule-desc-solo">{m.desc}</div>
    </React.Fragment>
  );
}

// ── XP / Advancement helpers ──────────────────────────────────────
const NO_ADVANCE_RULES = new Set(["No Brain","No XP","Unliving","Animal — no XP"]);

function canAdvance(warrior) {
  return warrior.rules ? !warrior.rules.some(r => NO_ADVANCE_RULES.has(r)) : true;
}

// Heroes (and Hired Swords) use the hero advancement table.
// Henchmen use the henchman table (max 4 advances total).
function xpTable(warrior) {
  return warrior.role === "Henchman" ? MR.HENCH_XP_THRESHOLDS : MR.HERO_XP_THRESHOLDS;
}

function advanceCount(xp, table) {
  return table.filter(t => t <= (xp || 0)).length;
}

function pendingAdvances(warrior) {
  if (!canAdvance(warrior)) return 0;
  return Math.max(0, advanceCount(warrior.xp, xpTable(warrior)) - (warrior.advancesUsed || 0));
}

function nextThreshold(xp, table) {
  return table.find(t => t > (xp || 0)) || null;
}

// ── Warband capacity ─────────────────────────────────────────────
// Halfling Scout's Cook rule grants +1 to the warband's maximum size while hired.
function effectiveMaxW(warband, def) {
  const hasHalfling = warband.warriors.some(w => w.hiredSwordId === "halflingScout");
  return def.maxWarriors + (hasHalfling ? 1 : 0);
}

// ── Wizard / Spell helpers ────────────────────────────────────────
const WIZARD_RULES = new Set(["Wizard","Wizard — Necromancy","Wizard — Horned Rat","Prayers of Sigmar"]);
function isWizard(warrior) {
  return warrior.rules?.some(r => WIZARD_RULES.has(r)) || false;
}
function spellSchool(warrior) {
  return MR.SPELL_CASTERS[warrior.unitId] || null;
}

// Tooltip for a learned skill
function skillTip(key) {
  const s = MR.SKILLS[key];
  if (!s) return null;
  return (
    <React.Fragment>
      <div className="tip-title">{s.name}</div>
      <div className="tip-rule-desc tip-rule-desc-solo">{s.desc}</div>
    </React.Fragment>
  );
}

function Roster({ warband, onBack, update, onExport }) {
  const def = MR.WARBANDS[warband.faction];
  const [recruitOpen, setRecruitOpen] = useStateR(false);
  const [equipFor, setEquipFor] = useStateR(null); // warrior id
  const [advancingHero, setAdvancingHero] = useStateR(null);   // hero warrior id
  const [advancingGroup, setAdvancingGroup] = useStateR(null); // henchman groupId
  const [ladsTalentHeroId, setLadsTalentHeroId] = useStateR(null); // newly promoted hero waiting to pick skill categories
  const [spellbookFor, setSpellbookFor] = useStateR(null);    // warrior id
  const [hireMoreFor, setHireMoreFor] = useStateR(null);      // groupId
  const [hiredSwordsOpen, setHiredSwordsOpen] = useStateR(false);
  const [dpOpen, setDpOpen] = useStateR(false);
  const [tradingPostOpen, setTradingPostOpen] = useStateR(false);
  const [stockpileOpen, setStockpileOpen] = useStateR(false);
  const [injuryFor, setInjuryFor] = useStateR(null);          // warrior id

  const totalSpent = warband.warriors.reduce((sum, w) => sum + w.cost + w.gear.reduce((s,g)=>s + (MR.EQUIP[g.key]?.cost || 0), 0) + (w.mutations||[]).reduce((s,m)=>s + (m.paidCost || MR.MUTATIONS[m.key].cost), 0), 0);

  const adjust = (field, amount) => {
    update(w => ({ ...w, [field]: Math.max(0, (w[field] || 0) + amount) }));
  };

  const recruit = (unitDef, count = 1) => {
    if (unitDef.role === "Hero") {
      const idx = warband.warriors.filter(x => x.unitId === unitDef.id).length + 1;
      const newW = {
        id: uid(),
        unitId: unitDef.id,
        role: unitDef.role,
        title: unitDef.title,
        name: pickName(def.group),
        cost: unitDef.cost,
        xp: unitDef.xp || 0,
        advancesUsed: advanceCount(unitDef.xp || 0, MR.HERO_XP_THRESHOLDS),
        skills: [],
        knownSpells: [],
        profile: [...unitDef.profile],
        gear: [],
        mutations: [],
        list: unitDef.list,
        rules: unitDef.rules || [],
        note: unitDef.note,
        canMutate: !!unitDef.canMutate,
        isLeader: unitDef.min === 1,
        injuries: [],
        notes: "",
      };
      update(w => ({ ...w, gold: w.gold - unitDef.cost, warriors: [...w.warriors, newW] }));
    } else {
      // henchman: spawn `count` members sharing a groupId
      const groupId = uid();
      const idx = warband.warriors.filter(x => x.unitId === unitDef.id).length;
      const totalCost = unitDef.cost * count;
      const groupNum = warband.warriors.filter(x => x.unitId === unitDef.id && x.role === "Henchman").reduce((s,x) => { s.add(x.groupId); return s; }, new Set()).size + 1;
      const newWs = Array.from({ length: count }, (_, i) => ({
        id: uid(),
        groupId,
        groupLabel: groupNum,
        unitId: unitDef.id,
        role: unitDef.role,
        title: unitDef.title,
        name: `${unitDef.title} ${idx + i + 1}`,
        cost: unitDef.cost,
        xp: unitDef.xp || 0,
        advancesUsed: advanceCount(unitDef.xp || 0, MR.HENCH_XP_THRESHOLDS),
        skills: [],
        knownSpells: [],
        groupName: unitDef.title,
        profile: [...unitDef.profile],
        gear: [],
        mutations: [],
        list: unitDef.list,
        rules: unitDef.rules || [],
        note: unitDef.note,
        canMutate: !!unitDef.canMutate,
        injuries: [],
        notes: "",
      }));
      update(w => ({ ...w, gold: w.gold - totalCost, warriors: [...w.warriors, ...newWs] }));
    }
  };

  const fire = (id) => {
    const wrr = warband.warriors.find(x => x.id === id);
    if (!wrr) return;
    if (!confirm(`Dismiss ${wrr.name}? Their cost is not refunded.`)) return;
    update(w => ({ ...w, warriors: w.warriors.filter(x => x.id !== id) }));
  };

  const renameWarrior = (id, name) => {
    update(w => ({ ...w, warriors: w.warriors.map(x => x.id === id ? { ...x, name } : x) }));
  };

  const buyGear = (warriorId, key) => {
    const item = MR.EQUIP[key];
    if (!item) return;
    if (warband.gold < item.cost) return;
    update(w => ({
      ...w,
      gold: w.gold - item.cost,
      warriors: w.warriors.map(x => x.id === warriorId ? { ...x, gear: [...x.gear, { key, paidCost: item.cost }] } : x),
    }));
  };
  const sellGear = (warriorId, gearIdx) => {
    update(w => {
      const wr = w.warriors.find(x => x.id === warriorId);
      const it = wr.gear[gearIdx];
      const refund = Math.floor((it.paidCost || MR.EQUIP[it.key].cost) / 2);
      return {
        ...w,
        gold: w.gold + refund,
        warriors: w.warriors.map(x => x.id === warriorId ? { ...x, gear: x.gear.filter((_,i) => i !== gearIdx) } : x),
      };
    });
  };
  const buyMutation = (warriorId, mKey) => {
    const wr = warband.warriors.find(x => x.id === warriorId);
    const baseCost = MR.MUTATIONS[mKey].cost;
    const cost = wr.mutations.length === 0 ? baseCost : baseCost * 2;
    if (warband.gold < cost) return;
    update(w => ({
      ...w,
      gold: w.gold - cost,
      warriors: w.warriors.map(x => x.id === warriorId ? { ...x, mutations: [...x.mutations, { key: mKey, paidCost: cost }] } : x),
    }));
  };

  // Commit a cart of items at once (purchase action from EquipModal)
  const commitCart = (warriorId, cart) => {
    const wr = warband.warriors.find(x => x.id === warriorId);
    const isFree = !!(wr && wr.isHiredSword);
    const totalCost = isFree ? 0 : cart.reduce((s, c) => s + c.cost, 0);
    if (!isFree && warband.gold < totalCost) return;
    const newGear = cart.filter(c => c.kind === "gear").map(c => ({ key: c.key, paidCost: isFree ? 0 : c.cost }));
    const newMuts = cart.filter(c => c.kind === "mutation").map(c => ({ key: c.key, paidCost: isFree ? 0 : c.cost }));
    update(w => ({
      ...w,
      gold: w.gold - totalCost,
      warriors: w.warriors.map(x => x.id === warriorId
        ? { ...x, gear: [...x.gear, ...newGear], mutations: [...x.mutations, ...newMuts] }
        : x),
    }));
  };

  // ── Hired Sword handlers ────────────────────────────────────────────
  const hireHiredSword = (hsDef) => {
    if (warband.gold < hsDef.cost) return;
    const newW = {
      id: uid(),
      hiredSwordId: hsDef.id,
      unitId: hsDef.id,
      role: "HiredSword",
      title: hsDef.name,
      name: hsDef.name,
      cost: hsDef.cost,
      upkeep: hsDef.upkeep,
      xp: 0,
      advancesUsed: 0,
      skills: [],
      knownSpells: [],
      profile: [...hsDef.profile],
      gear: [],
      mutations: [],
      rules: hsDef.rules || [],
      note: hsDef.fluff,
      canMutate: false,
      isHiredSword: true,
      list: hsDef.id,
      injuries: [],
      notes: "",
    };
    update(w => ({ ...w, gold: w.gold - hsDef.cost, warriors: [...w.warriors, newW] }));
    setHiredSwordsOpen(false);
  };

  const dismissHiredSword = (id) => {
    const wrr = warband.warriors.find(x => x.id === id);
    if (!wrr) return;
    if (!confirm(`Dismiss ${wrr.name}? Their hire cost is not refunded.`)) return;
    update(w => ({ ...w, warriors: w.warriors.filter(x => x.id !== id) }));
  };

  // ── Dramatis Personae handlers ──
  const hireDramatisPersonae = (dpDef) => {
    const makeW = (name, profile, idx) => ({
      id: uid(), dpId: dpDef.id, unitId: dpDef.id + (idx ? `_${idx}` : ""),
      role: "DramatisPersonae", title: dpDef.name, name,
      cost: idx ? 0 : dpDef.hireCost, upkeep: dpDef.upkeepCost,
      xp: 0, advancesUsed: 0,
      skills:      [...(idx ? (dpDef.startSkills2 || []) : (dpDef.startSkills || []))],
      knownSpells: [...(dpDef.startSpells || [])],
      profile:     [...profile],
      gear:        (idx ? (dpDef.startGear2 || []) : (dpDef.startGear || [])).map(g => ({...g})),
      mutations: [], rules: [...(dpDef.startRules || [])],
      note: dpDef.fluff, canMutate: false, isDramatisPersonae: true,
      list: null, injuries: [], notes: "",
    });
    let newWarriors;
    if (dpDef.isPair) {
      newWarriors = [makeW("Marquand Volker", dpDef.profile, 0), makeW("Ulli Leitpold", dpDef.profile2, 1)];
    } else {
      newWarriors = [makeW(dpDef.name, dpDef.profile, 0)];
    }
    update(w => ({ ...w, gold: w.gold - dpDef.hireCost, warriors: [...w.warriors, ...newWarriors] }));
    setDpOpen(false);
  };

  const dismissDramatisPersonae = (dpId) => {
    const matches = warband.warriors.filter(x => x.dpId === dpId);
    if (!matches.length) return;
    const label = matches.length > 1 ? matches.map(x => x.name).join(" & ") : matches[0].name;
    if (!confirm(`Dismiss ${label}? Their hire cost is not refunded.`)) return;
    update(w => ({ ...w, warriors: w.warriors.filter(x => x.dpId !== dpId) }));
  };

  // ── Hire-more handler (add members to an existing henchman group) ──
  const hireMore = (groupId, count) => {
    const member = warband.warriors.find(x => (x.groupId || x.id) === groupId);
    if (!member) return;
    const unitDef = def.units.find(u => u.id === member.unitId);
    if (!unitDef) return;
    const totalCost = unitDef.cost * count;
    if (warband.gold < totalCost) return;
    const currentIdx = warband.warriors.filter(x => x.unitId === member.unitId).length;
    const newWs = Array.from({ length: count }, (_, i) => ({
      id: uid(),
      groupId,
      groupLabel: member.groupLabel,
      unitId: member.unitId,
      role: member.role,
      title: member.title,
      name: `${member.title} ${currentIdx + i + 1}`,
      cost: unitDef.cost,
      xp: 0,
      advancesUsed: 0,
      skills: [],
      knownSpells: [],
      groupName: member.groupName || member.title,
      profile: [...unitDef.profile],
      gear: [],
      mutations: [],
      list: unitDef.list,
      rules: unitDef.rules || [],
      note: unitDef.note,
      canMutate: !!unitDef.canMutate,
      injuries: [],
      notes: "",
    }));
    update(w => ({ ...w, gold: w.gold - totalCost, warriors: [...w.warriors, ...newWs] }));
  };

  // ── Spell & group-rename handlers ───────────────────────────────
  const toggleSpell = (warriorId, spellKey) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x => {
        if (x.id !== warriorId) return x;
        const known = x.knownSpells || [];
        const newKnown = known.includes(spellKey)
          ? known.filter(k => k !== spellKey)
          : [...known, spellKey];
        return { ...x, knownSpells: newKnown };
      }),
    }));
  };

  const renameGroup = (groupId, newName) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x =>
        (x.groupId || x.id) === groupId ? { ...x, groupName: newName } : x),
    }));
  };

  // ── Notes handler ──────────────────────────────────────────────
  const updateWarriorNote = (warriorId, notes) => {
    update(wb => ({
      ...wb,
      warriors: wb.warriors.map(w => w.id === warriorId ? { ...w, notes } : w),
    }));
  };

  // ── Trading Post / Stockpile handlers ─────────────────────────
  const buyTpItem = (key, paidCost, targetId) => {
    if (warband.gold < paidCost) return;
    if (targetId === "__stockpile__") {
      update(wb => ({
        ...wb,
        gold: wb.gold - paidCost,
        stockpile: [...(wb.stockpile || []), { key, paidCost }],
      }));
    } else {
      update(wb => ({
        ...wb,
        gold: wb.gold - paidCost,
        warriors: wb.warriors.map(w =>
          w.id === targetId ? { ...w, gear: [...w.gear, { key, paidCost }] } : w),
      }));
    }
  };

  const equipFromStockpile = (stockpileIdx, warriorId) => {
    const item = (warband.stockpile || [])[stockpileIdx];
    if (!item) return;
    update(wb => ({
      ...wb,
      stockpile: (wb.stockpile || []).filter((_, i) => i !== stockpileIdx),
      warriors: wb.warriors.map(w =>
        w.id === warriorId
          ? { ...w, gear: [...w.gear, { key: item.key, paidCost: item.paidCost }] }
          : w),
    }));
  };

  const sellFromStockpile = (stockpileIdx) => {
    const item = (warband.stockpile || [])[stockpileIdx];
    if (!item) return;
    const refund = Math.floor((item.paidCost || MR.EQUIP[item.key]?.cost || 0) / 2);
    update(wb => ({
      ...wb,
      gold: wb.gold + refund,
      stockpile: (wb.stockpile || []).filter((_, i) => i !== stockpileIdx),
    }));
  };

  // Send gear from a warrior's loadout into the warband stockpile
  const sendToStockpile = (warriorId, gearIdx) => {
    update(wb => {
      const wr = wb.warriors.find(x => x.id === warriorId);
      if (!wr) return wb;
      const it = wr.gear[gearIdx];
      return {
        ...wb,
        stockpile: [...(wb.stockpile || []), { key: it.key, paidCost: it.paidCost || MR.EQUIP[it.key]?.cost || 0 }],
        warriors: wb.warriors.map(x => x.id === warriorId
          ? { ...x, gear: x.gear.filter((_, i) => i !== gearIdx) }
          : x),
      };
    });
  };

  // ── Injury handlers ────────────────────────────────────────────
  const toggleInjury = (warriorId, injuryKey) => {
    update(wb => {
      const warriors = wb.warriors.map(w => {
        if (w.id !== warriorId) return w;
        const injuries = w.injuries || [];
        const injDef = MR.INJURIES.find(inj => inj.key === injuryKey);
        const existingIdx = injuries.findIndex(i => i.key === injuryKey);
        if (existingIdx !== -1) {
          // Remove: reverse the recorded applied delta
          const existing = injuries[existingIdx];
          let newProfile = [...w.profile];
          if (injDef && injDef.statIdx !== null && existing.applied !== 0) {
            newProfile[injDef.statIdx] = newProfile[injDef.statIdx] - existing.applied;
          }
          return { ...w, profile: newProfile, injuries: injuries.filter((_, i) => i !== existingIdx) };
        } else {
          // Add: apply delta (clamped to min 1), record actual applied amount
          let applied = 0;
          let newProfile = [...w.profile];
          if (injDef && injDef.statIdx !== null) {
            const cur = newProfile[injDef.statIdx];
            const next = Math.max(1, cur + injDef.delta);
            applied = next - cur;
            newProfile[injDef.statIdx] = next;
          }
          return { ...w, profile: newProfile, injuries: [...injuries, { key: injuryKey, applied }] };
        }
      });
      return { ...wb, warriors };
    });
  };

  // ── XP & Advancement handlers ───────────────────────────────────
  const adjustXP = (id, delta) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x => x.id === id
        ? { ...x, xp: Math.max(0, (x.xp || 0) + delta) }
        : x),
    }));
  };

  const adjustGroupXP = (groupId, delta) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x =>
        (x.groupId || x.id) === groupId
          ? { ...x, xp: Math.max(0, (x.xp || 0) + delta) }
          : x),
    }));
  };

  const applyHeroAdvancement = (id, adv) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x => {
        if (x.id !== id) return x;
        const nx = { ...x, advancesUsed: (x.advancesUsed || 0) + 1 };
        if (adv.type === "skill") {
          nx.skills = [...(x.skills || []), adv.key];
        } else if (adv.type === "spell") {
          nx.knownSpells = [...(x.knownSpells || []), adv.key];
        } else if (adv.type === "stat") {
          const p = [...x.profile]; p[adv.idx]++; nx.profile = p;
        }
        return nx;
      }),
    }));
    setAdvancingHero(null);
  };

  const applyGroupAdvancement = (groupId, adv) => {
    if (adv.type === "ladsGotTalent") {
      applyLadsGotTalent(groupId);
      return; // remaining group members keep their advance — handled separately
    }
    update(w => ({
      ...w,
      warriors: w.warriors.map(x => {
        if ((x.groupId || x.id) !== groupId) return x;
        const nx = { ...x, advancesUsed: (x.advancesUsed || 0) + 1 };
        if (adv.type === "stat") {
          const p = [...x.profile]; p[adv.idx]++; nx.profile = p;
        }
        return nx;
      }),
    }));
    setAdvancingGroup(null);
  };

  // ── Lad's Got Talent ─────────────────────────────────────────────
  // Separates one henchman from the group and promotes them to a Hero.
  // The remaining members keep their pending advance (advancesUsed NOT incremented).
  const applyLadsGotTalent = (groupId) => {
    const members = warband.warriors.filter(x => (x.groupId || x.id) === groupId);
    if (!members.length) return;
    const tmpl = members[0]; // the warrior being elevated
    const newHeroId = uid();
    const newHero = {
      id:          newHeroId,
      unitId:      tmpl.unitId,
      role:        "Hero",
      title:       tmpl.title,
      name:        tmpl.name,
      cost:        tmpl.cost,
      xp:          tmpl.xp,
      advancesUsed: 0,         // reset: starts fresh on the hero advance track
      skills:      [],
      knownSpells: tmpl.knownSpells ? [...tmpl.knownSpells] : [],
      profile:     [...tmpl.profile],
      gear:        (tmpl.gear      || []).map(g => ({ ...g })),
      mutations:   (tmpl.mutations || []).map(m => ({ ...m })),
      list:        tmpl.list,
      rules:       [...(tmpl.rules || [])],
      canMutate:   !!tmpl.canMutate,
      isLeader:    false,
      injuries:    [...(tmpl.injuries || [])],
      notes:       tmpl.notes || "",
    };
    // Remove the template warrior, append the new hero.
    // Remaining group members are untouched — their advancesUsed stays as-is.
    update(w => ({
      ...w,
      warriors: [...w.warriors.filter(x => x.id !== tmpl.id), newHero],
    }));
    setAdvancingGroup(null);
    setLadsTalentHeroId(newHeroId);
  };

  // Called when player confirms their 2 skill category choices for the new Lad's Got Talent hero.
  // Stores the categories then immediately opens the hero advancement modal for their free roll.
  const applyLadsCategories = (heroId, cats) => {
    update(w => ({
      ...w,
      warriors: w.warriors.map(x =>
        x.id === heroId ? { ...x, customSkillCategories: cats } : x
      ),
    }));
    setLadsTalentHeroId(null);
    setAdvancingHero(heroId);
  };

  // Leader logic — fall back to unitDef.min===1 for warbands without explicit isLeader set
  const hasExplicitLeader = warband.warriors.some(x => x.role === "Hero" && x.isLeader === true);
  const isEffectiveLeader = (w) => {
    if (hasExplicitLeader) return w.isLeader === true;
    return !!def.units.find(u => u.id === w.unitId && u.min === 1);
  };

  const toggleLeader = (id) => {
    const target = warband.warriors.find(x => x.id === id);
    if (!target) return;
    const becoming = !isEffectiveLeader(target);
    const msg = becoming
      ? `Promote ${target.name} to Warband Leader?`
      : `Remove ${target.name} as Warband Leader?`;
    if (!confirm(msg)) return;
    update(w => ({
      ...w,
      warriors: w.warriors.map(x =>
        x.role === "Hero" ? { ...x, isLeader: becoming ? x.id === id : false } : x
      ),
    }));
  };

  const heroes = warband.warriors
    .filter(x => x.role === "Hero")
    .sort((a, b) => (isEffectiveLeader(b) ? 1 : 0) - (isEffectiveLeader(a) ? 1 : 0));
  const henchmen = warband.warriors.filter(x => x.role === "Henchman");
  const hiredSwords = warband.warriors.filter(x => x.role === "HiredSword");
  const dpWarriors  = warband.warriors.filter(x => x.role === "DramatisPersonae");

  // Group henchmen by groupId; preserve insertion order
  const henchmanGroups = useMemoR(() => {
    const order = [];
    const byGroup = {};
    henchmen.forEach(w => {
      const k = w.groupId || w.id;
      if (!byGroup[k]) { byGroup[k] = []; order.push(k); }
      byGroup[k].push(w);
    });
    return order.map(k => byGroup[k]);
  }, [henchmen]);

  return (
    <React.Fragment>
      <button className="back-link" onClick={onBack}>← All Warbands</button>
      <div className="roster-header">
        <div className="roster-title">
          <div className="roster-sub">{def.group}</div>
          <h1>{warband.name}</h1>
          <div className="roster-flavor">{def.flavor}</div>
        </div>
      </div>

      <TreasureBar gold={warband.gold} wyrdstone={warband.wyrdstone}
                   warriors={warband.warriors.length} maxW={effectiveMaxW(warband, def)}
                   totalXp={warband.warriors.reduce((s, x) => s + (x.xp || 0), 0)}
                   dpRating={[...new Set(warband.warriors.filter(x => x.isDramatisPersonae).map(x => x.dpId))].reduce((s, id) => s + (MR.DRAMATIS_PERSONAE.find(d => d.id === id)?.ratingBonus || 0), 0)}
                   adjust={adjust} />

      <div className="lore-block">
        <div className="l-title">Warband Rules · {def.name}</div>
        <ul>{def.special.map((s,i) => <li key={i}>{s}</li>)}</ul>
      </div>

      <Section title="Heroes" count={`${heroes.length}/6`}>
        {heroes.map((w, i) => (
          <WarriorCard key={w.id} warrior={w} idx={i} def={def}
                       isLeader={isEffectiveLeader(w)}
                       onRename={(n) => renameWarrior(w.id, n)}
                       onFire={() => fire(w.id)}
                       onEquip={() => setEquipFor(w.id)}
                       onSellGear={(gi) => sendToStockpile(w.id, gi)}
                       onAdjustXP={(d) => adjustXP(w.id, d)}
                       onAdvance={() => setAdvancingHero(w.id)}
                       onSpellbook={isWizard(w) ? () => setSpellbookFor(w.id) : undefined}
                       onPromote={() => toggleLeader(w.id)}
                       onOpenInjuries={() => setInjuryFor(w.id)} />
        ))}
        {heroes.length === 0 && <div className="muted" style={{fontStyle:"italic", padding:"10px 0"}}>No heroes yet. Every warband must field a leader before its first battle.</div>}
      </Section>

      <Section title="Henchmen" count={henchmen.length}>
        {henchmanGroups.map((members, gi) => (
          <HenchmanGroup
            key={members[0].groupId || members[0].id}
            members={members}
            def={def}
            idx={gi}
            onRename={renameWarrior}
            onFire={fire}
            onEquip={(id) => setEquipFor(id)}
            onSellGear={sendToStockpile}
            onAdjustGroupXP={(d) => adjustGroupXP(members[0].groupId || members[0].id, d)}
            onAdvanceGroup={() => setAdvancingGroup(members[0].groupId || members[0].id)}
            onRenameGroup={(newName) => renameGroup(members[0].groupId || members[0].id, newName)}
            onHireMore={() => setHireMoreFor(members[0].groupId || members[0].id)}
            onOpenInjuries={(id) => setInjuryFor(id)} />
        ))}
        {henchmen.length === 0 && <div className="muted" style={{fontStyle:"italic", padding:"10px 0"}}>No henchmen yet.</div>}
      </Section>

      {hiredSwords.length > 0 && (
        <Section title="Hired Swords" count={hiredSwords.length}>
          {hiredSwords.map((w, i) => (
            <WarriorCard key={w.id} warrior={w} idx={i} def={def}
                         isLeader={false}
                         isHiredSword={true}
                         onRename={(n) => renameWarrior(w.id, n)}
                         onFire={() => dismissHiredSword(w.id)}
                         onEquip={() => setEquipFor(w.id)}
                         onSellGear={(gi) => sendToStockpile(w.id, gi)}
                         onAdjustXP={(d) => adjustXP(w.id, d)}
                         onAdvance={() => setAdvancingHero(w.id)}
                         onSpellbook={isWizard(w) ? () => setSpellbookFor(w.id) : undefined}
                         onPromote={undefined}
                         onOpenInjuries={() => setInjuryFor(w.id)} />
          ))}
        </Section>
      )}

      {dpWarriors.length > 0 && (
        <Section title="Dramatis Personae" count={dpWarriors.length}>
          {dpWarriors.map((w, i) => (
            <WarriorCard key={w.id} warrior={w} idx={i} def={def}
                         isLeader={false}
                         isHiredSword={false}
                         isDramatisPersonae={true}
                         onRename={(n) => renameWarrior(w.id, n)}
                         onFire={() => dismissDramatisPersonae(w.dpId)}
                         onEquip={() => setEquipFor(w.id)}
                         onSellGear={(gi) => sendToStockpile(w.id, gi)}
                         onAdjustXP={(d) => adjustXP(w.id, d)}
                         onAdvance={() => setAdvancingHero(w.id)}
                         onSpellbook={isWizard(w) ? () => setSpellbookFor(w.id) : undefined}
                         onPromote={undefined}
                         onOpenInjuries={() => setInjuryFor(w.id)} />
          ))}
        </Section>
      )}

      <div style={{textAlign:"center", marginTop: 30, display:"flex", justifyContent:"center", gap:12, flexWrap:"wrap"}}>
        <button className="btn primary" onClick={() => setRecruitOpen(true)}
                disabled={warband.warriors.length >= effectiveMaxW(warband, def)}>
          {warband.warriors.length >= effectiveMaxW(warband, def) ? "Warband at Maximum" : "+ Recruit a Warrior"}
        </button>
        <button className="btn hs-btn" onClick={() => setHiredSwordsOpen(true)}>
          ⚔ Hired Swords
        </button>
        <button className="btn dp-btn" onClick={() => setDpOpen(true)}>
          ✦ Dramatis Personae
        </button>
        <button className="btn tp-btn" onClick={() => setTradingPostOpen(true)}>
          ⚜ Trading Post
        </button>
        <button className="btn sp-btn" onClick={() => setStockpileOpen(true)}>
          📦 Stockpile{(warband.stockpile?.length > 0) ? ` · ${warband.stockpile.length}` : ""}
        </button>
        {onExport && (
          <button className="btn ghost btn-sm" onClick={onExport} title="Save this warband to a JSON file">
            ↓ Export Roster
          </button>
        )}
        <button className="btn ghost btn-sm" onClick={() => printRoster(warband, def)} title="Open print-ready roster sheet">
          🖶 Print Roster
        </button>
      </div>
      <p className="scroll-hint">Total Spent · {totalSpent}gc · Starting Gold {def.startGold}gc</p>

      {recruitOpen && (
        <RecruitModal warband={warband} def={def}
                      onClose={() => setRecruitOpen(false)}
                      onRecruit={recruit} />
      )}
      {equipFor && (
        <EquipModal warrior={warband.warriors.find(x => x.id === equipFor)}
                    warband={warband} def={def}
                    onClose={() => setEquipFor(null)}
                    onCommit={(cart) => commitCart(equipFor, cart)}
                    onSell={(idx) => sendToStockpile(equipFor, idx)}
                    onEquipFromStockpile={(idx) => equipFromStockpile(idx, equipFor)}
                    onSellFromStockpile={(idx) => sellFromStockpile(idx)} />
      )}
      {advancingHero && (() => {
        const hw = warband.warriors.find(x => x.id === advancingHero);
        return hw ? (
          <AdvancementModal
            warrior={hw}
            isGroup={false}
            onApply={(adv) => applyHeroAdvancement(advancingHero, adv)}
            onClose={() => setAdvancingHero(null)} />
        ) : null;
      })()}
      {advancingGroup && (() => {
        const members = warband.warriors.filter(x => (x.groupId || x.id) === advancingGroup);
        return members.length > 0 ? (
          <AdvancementModal
            warrior={members[0]}
            isGroup={true}
            groupSize={members.length}
            onApply={(adv) => applyGroupAdvancement(advancingGroup, adv)}
            onClose={() => setAdvancingGroup(null)} />
        ) : null;
      })()}
      {ladsTalentHeroId && (() => {
        const hero = warband.warriors.find(x => x.id === ladsTalentHeroId);
        return hero ? (
          <LadsTalentCategoryModal
            warrior={hero}
            onApply={(cats) => applyLadsCategories(ladsTalentHeroId, cats)}
            onClose={() => setLadsTalentHeroId(null)} />
        ) : null;
      })()}
      {spellbookFor && (() => {
        const sw = warband.warriors.find(x => x.id === spellbookFor);
        return sw ? (
          <SpellbookModal
            warrior={sw}
            onToggle={(key) => toggleSpell(spellbookFor, key)}
            onClose={() => setSpellbookFor(null)} />
        ) : null;
      })()}
      {hireMoreFor && (() => {
        const members = warband.warriors.filter(x => (x.groupId || x.id) === hireMoreFor);
        if (!members.length) return null;
        const unitDef = def.units.find(u => u.id === members[0].unitId);
        if (!unitDef) return null;
        return (
          <HireMoreModal
            members={members}
            unitDef={unitDef}
            warband={warband}
            def={def}
            onClose={() => setHireMoreFor(null)}
            onHire={(count) => { hireMore(hireMoreFor, count); setHireMoreFor(null); }} />
        );
      })()}
      {hiredSwordsOpen && (
        <HiredSwordsModal
          warband={warband}
          def={def}
          onClose={() => setHiredSwordsOpen(false)}
          onHire={hireHiredSword} />
      )}
      {dpOpen && (
        <DramatisPersonaeModal
          warband={warband}
          def={def}
          onClose={() => setDpOpen(false)}
          onHire={hireDramatisPersonae} />
      )}
      {tradingPostOpen && (
        <TradingPostModal
          warband={warband}
          def={def}
          onClose={() => setTradingPostOpen(false)}
          onBuy={buyTpItem} />
      )}
      {stockpileOpen && (
        <StockpileModal
          warband={warband}
          onClose={() => setStockpileOpen(false)}
          onGive={equipFromStockpile}
          onSell={sellFromStockpile} />
      )}
      {injuryFor && (() => {
        const iw = warband.warriors.find(x => x.id === injuryFor);
        return iw ? (
          <NotesModal
            warrior={iw}
            onClose={() => setInjuryFor(null)}
            onToggle={(key) => toggleInjury(injuryFor, key)}
            onUpdateNote={(text) => updateWarriorNote(injuryFor, text)} />
        ) : null;
      })()}
    </React.Fragment>
  );
}

function TreasureBar({ gold, wyrdstone, warriors, maxW, totalXp, dpRating, adjust }) {
  const [editOpen, setEditOpen] = useStateR(false);
  const low = gold < 25;
  const rating = warriors * 5 + (totalXp || 0) + (dpRating || 0);
  return (
    <React.Fragment>
    <div className="treasure-bar">
      <div className="tr-cell tr-treasury">
        <span className="tr-label">Treasury</span>
        <span className={"tr-value" + (low ? " warn" : "")}>{gold}<span className="tr-unit">gc</span></span>
      </div>
      <div className="tr-cell tr-wyrd">
        <span className="tr-label">Wyrdstone</span>
        <span className="tr-value">{wyrdstone}<span className="tr-unit">shards</span></span>
      </div>
      <div className="tr-cell tr-warriors">
        <span className="tr-label">Warriors</span>
        <span className="tr-value">{warriors}<span className="tr-unit">/ {maxW}</span></span>
      </div>
      <div className="tr-cell tr-rating">
        <span className="tr-label">Rating</span>
        <span className="tr-value">{rating}</span>
      </div>
      <button className="tr-edit" onClick={() => setEditOpen(true)} aria-label="Edit treasury">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6">
          <path d="M3 14.5V17h2.5L15 7.5 12.5 5 3 14.5z"/>
          <path d="M13.5 4l2.5 2.5"/>
        </svg>
        <span>Edit</span>
      </button>
    </div>
    {editOpen && <TreasuryEditModal gold={gold} wyrdstone={wyrdstone} adjust={adjust} onClose={() => setEditOpen(false)} />}
    </React.Fragment>
  );
}

function TreasuryEditModal({ gold, wyrdstone, adjust, onClose }) {
  const [goldDelta, setGoldDelta] = useStateR(0);
  const [shardDelta, setShardDelta] = useStateR(0);
  const apply = () => {
    if (goldDelta) adjust("gold", goldDelta);
    if (shardDelta) adjust("wyrdstone", shardDelta);
    onClose();
  };
  const newGold = Math.max(0, gold + goldDelta);
  const newShards = Math.max(0, wyrdstone + shardDelta);
  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal treasury-edit" onClick={e => e.stopPropagation()} style={{maxWidth: 480}}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Adjust Treasury</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>Reckon the spoils of the dead city.</p>

        <div className="te-row">
          <div className="te-head">
            <span className="te-label">Gold Crowns</span>
            <span className="te-current">{gold} <span className="te-unit">gc</span></span>
          </div>
          <div className="te-controls">
            <button className="te-step" onClick={() => setGoldDelta(d => d - 50)}>−50</button>
            <button className="te-step" onClick={() => setGoldDelta(d => d - 10)}>−10</button>
            <button className="te-step" onClick={() => setGoldDelta(d => d - 1)}>−1</button>
            <input type="number" className="te-input" value={goldDelta}
                   onChange={e => setGoldDelta(parseInt(e.target.value) || 0)} />
            <button className="te-step" onClick={() => setGoldDelta(d => d + 1)}>+1</button>
            <button className="te-step" onClick={() => setGoldDelta(d => d + 10)}>+10</button>
            <button className="te-step" onClick={() => setGoldDelta(d => d + 50)}>+50</button>
          </div>
          {goldDelta !== 0 && (
            <div className="te-preview">
              <span className="muted">After:</span>
              <span className="te-new">{newGold} <span className="te-unit">gc</span></span>
              <span className={"te-delta " + (goldDelta > 0 ? "pos" : "neg")}>
                {goldDelta > 0 ? "+" : ""}{goldDelta}
              </span>
            </div>
          )}
        </div>

        <div className="te-row">
          <div className="te-head">

function RecruitModal({ warband, def, onClose, onRecruit }) {
  const countByUnit = useMemoR(() => {
    const c = {};
    warband.warriors.forEach(w => c[w.unitId] = (c[w.unitId]||0)+1);
    return c;
  }, [warband.warriors]);

  const canAfford = (u) => warband.gold >= u.cost;
  const atFull = warband.warriors.length >= effectiveMaxW(warband, def);
  const atLimit = (u) => u.max !== undefined && (countByUnit[u.id] || 0) >= u.max;

  const heroes = def.units.filter(u => u.role === "Hero");
  const henchmen = def.units.filter(u => u.role === "Henchman");

  const [hireFor, setHireFor] = useStateR(null); // henchman def the user wants to hire

  const handleTileClick = (u) => {
    if (u.role === "Hero") {
      onRecruit(u, 1);
    } else {
      setHireFor(u);
    }
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Recruit a Warrior</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>Treasury · <span style={{color:"var(--candle)"}}>{warband.gold}gc</span> · {warband.warriors.length}/{def.maxWarriors} warriors</p>

        <div className="eq-section-title" style={{marginTop:24}}>Heroes</div>
        <div className="recruit-grid">
          {heroes.map(u => (
            <UnitTile key={u.id} u={u}
                      have={countByUnit[u.id]||0}
                      disabled={!canAfford(u) || atFull || atLimit(u)}
                      onClick={() => handleTileClick(u)} />
          ))}
        </div>

        <div className="eq-section-title">Henchmen <span style={{textTransform:"none", letterSpacing:"normal", color:"var(--ink-faint)", fontSize:12}}>hired in groups of 1–{henchmen[0]?.group || 5}</span></div>
        <div className="recruit-grid">
          {henchmen.map(u => (
            <UnitTile key={u.id} u={u}
                      have={countByUnit[u.id]||0}
                      disabled={!canAfford(u) || atFull || atLimit(u)}
                      onClick={() => handleTileClick(u)} />
          ))}
        </div>

        {hireFor && (
          <HireGroupDialog
            unit={hireFor}
            warband={warband}
            def={def}
            currentCount={countByUnit[hireFor.id] || 0}
            onCancel={() => setHireFor(null)}
            onHire={(count) => { onRecruit(hireFor, count); setHireFor(null); }} />
        )}
      </div>
    </div>
  );
}

function HireGroupDialog({ unit, warband, def, currentCount, onCancel, onHire }) {
  // Max we can hire:
  //   - unit.group (group cap, typically 5)
  //   - unit.max ? remaining unit-type quota
  //   - remaining warband capacity
  //   - budget
  const groupCap = unit.group || 5;
  const typeRemaining = unit.max !== undefined ? Math.max(0, unit.max - currentCount) : Infinity;
  const warbandRemaining = effectiveMaxW(warband, def) - warband.warriors.length;
  const budgetMax = Math.floor(warband.gold / unit.cost);
  const maxHire = Math.max(1, Math.min(groupCap, typeRemaining, warbandRemaining, budgetMax));
  const [count, setCount] = useStateR(1);
  const safeCount = Math.min(Math.max(1, count), maxHire);
  const totalCost = safeCount * unit.cost;
  return (
    <div className="detail-backdrop" onClick={onCancel}>
      <div className="detail-card hire-card" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onCancel}>✕</button>
        <div className="detail-eyebrow">New Henchman Group</div>
        <h3 className="detail-title">{unit.title}</h3>
        <p style={{textAlign:"center", color:"var(--ink-dim)", fontSize:15, lineHeight:1.5, marginBottom: 20}}>
          Hire how many to this group?
        </p>

        <div className="hire-counter">
          <button className="hire-step" onClick={() => setCount(c => Math.max(1, c - 1))} disabled={safeCount <= 1}>−</button>
          <div className="hire-value">{safeCount}</div>
          <button className="hire-step" onClick={() => setCount(c => Math.min(maxHire, c + 1))} disabled={safeCount >= maxHire}>+</button>
        </div>

        <div className="hire-pips">
          {Array.from({length: groupCap}, (_, i) => {
            const filled = i < safeCount;
            const blocked = i + 1 > maxHire;
            return (
              <button key={i}
                      className={"hire-pip" + (filled ? " on" : "") + (blocked ? " blocked" : "")}
                      disabled={blocked}
                      onClick={() => setCount(i + 1)}
                      title={blocked ? "Cannot afford or at limit" : `${i + 1}`}>{i + 1}</button>
            );
          })}
        </div>

        <div className="hire-summary">
          <div className="hire-row">
            <span className="hire-label">Cost per warrior</span>
            <span className="hire-val">{unit.cost}gc</span>
          </div>
          <div className="hire-row hire-row-total">
            <span className="hire-label">Total</span>
            <span className="hire-val candle">{totalCost}gc</span>
          </div>
          {unit.max !== undefined && (
            <div className="hire-row">
              <span className="hire-label muted">Quota after</span>
              <span className="hire-val muted">{currentCount + safeCount} / {unit.max}</span>
            </div>
          )}
        </div>

        <div className="detail-footer">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn primary" onClick={() => onHire(safeCount)}>
            Hire {safeCount} · {totalCost}gc
          </button>
        </div>
      </div>
    </div>
  );
}
