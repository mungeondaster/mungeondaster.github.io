function EquipModal({ warrior, warband, def, onClose, onCommit, onSell, onEquipFromStockpile, onSellFromStockpile }) {
  if (!warrior) return null;
  const isFree = !!warrior.isHiredSword || !!warrior.isDramatisPersonae;
  const list = warrior.list ? MR.LISTS[warrior.list] : [];
  const heroOnly = warrior.list === "sisters" && warrior.role === "Hero" ? MR.LISTS.sistersHeroOnly : [];

  const group = (items, type) => items.filter(k => MR.EQUIP[k]?.type === type);
  // Free dagger is available to every warrior who can equip gear
  const melee = ["freeDagger", ...group(list, "melee")];
  const missile = group(list, "missile");
  const armour = group(list, "armour");

  // cart = array of { kind: "gear"|"mutation", key, cost }
  const [cart, setCart] = useStateR([]);
  const [detail, setDetail] = useStateR(null); // { kind, key }
  const [confirmCancel, setConfirmCancel] = useStateR(false);

  const cartTotal = isFree ? 0 : cart.reduce((s, c) => s + c.cost, 0);
  const goldAfter = warband.gold - cartTotal;

  // Mutation cost depends on count: base if 0 mutations on warrior+cart, else doubled.
  const mutCountInCart = cart.filter(c => c.kind === "mutation").length;
  const mutationCostFor = (mKey) => {
    if (isFree) return 0;
    const base = MR.MUTATIONS[mKey].cost;
    const total = warrior.mutations.length + mutCountInCart;
    return total === 0 ? base : base * 2;
  };

  const openDetail = (kind, key) => setDetail({ kind, key });
  const closeDetail = () => setDetail(null);

  const addToCart = (kind, key) => {
    const cost = isFree ? 0 : (kind === "gear" ? MR.EQUIP[key].cost : mutationCostFor(key));
    if (!isFree && goldAfter < cost) return; // can't afford with current cart
    setCart(c => [...c, { kind, key, cost }]);
    setDetail(null);
  };

  const removeFromCart = (idx) => {
    setCart(c => c.filter((_, i) => i !== idx));
  };

  const tryClose = () => {
    if (cart.length === 0) { onClose(); return; }
    setConfirmCancel(true);
  };

  const purchaseAndClose = () => {
    onCommit(cart);
    onClose();
  };

  return (
    <div className="modal-backdrop" onClick={tryClose}>
      <div className="modal equip-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={tryClose}>✕</button>
        <h2>{warrior.name}</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>
          {warrior.title}
          {isFree
            ? <React.Fragment>
                <span style={{margin:"0 8px", color:"var(--rule-gold)"}}>·</span>
                <span style={{color:"var(--hs-free-color,#80c090)", fontSize:12}}>Equipment included in hire cost — no charge</span>
              </React.Fragment>
            : <React.Fragment>
                <span style={{margin:"0 8px", color:"var(--rule-gold)"}}>·</span>
                Treasury <span style={{color:"var(--candle)"}}>{warband.gold}gc</span>
                {cart.length > 0 && (
                  <React.Fragment>
                    <span style={{margin:"0 8px", color:"var(--rule-gold)"}}>→</span>
                    <span style={{color: goldAfter < 0 ? "var(--blood-bright)" : "var(--candle)"}}>{goldAfter}gc</span>
                    <span style={{color:"var(--ink-faint)", marginLeft:8, fontSize:12}}>after cart</span>
                  </React.Fragment>
                )}
              </React.Fragment>
          }
        </p>

        {warrior.gear.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title" style={{marginTop: 22}}>Currently Carried</div>
            <div className="gear-list">
              {warrior.gear.map((g, i) => (
                <span key={i} className="gear-pill">
                  {MR.EQUIP[g.key].name}
                  <span className="x" onClick={() => onSell(i)}
                    title={isFree ? "Remove item" : "Send to stockpile"}>✕</span>
                </span>
              ))}
            </div>
          </React.Fragment>
        )}

        {(warband.stockpile?.length > 0) && (
          <React.Fragment>
            <div className="eq-section-title stockpile-title" style={{marginTop: 22}}>
              <span>Warband Stockpile</span>
              <span className="stockpile-subtitle">free — already purchased</span>
            </div>
            <div className="gear-list">
              {(warband.stockpile || []).map((si, idx) => {
                const it = MR.EQUIP[si.key];
                if (!it) return null;
                return (
                  <Tip key={idx} className="gear-pill stockpile-pill" content={gearTip(si.key)}>
                    {it.name}
                    {onEquipFromStockpile && (
                      <span className="x stockpile-take"
                            onClick={(e) => { e.stopPropagation(); onEquipFromStockpile(idx); }}
                            title="Take from stockpile">⊕</span>
                    )}
                    {onSellFromStockpile && (
                      <span className="x"
                            onClick={(e) => { e.stopPropagation(); onSellFromStockpile(idx); }}
                            title={`Sell for ${Math.floor((si.paidCost || it.cost) / 2)}gc`}>✕</span>
                    )}
                  </Tip>
                );
              })}
            </div>
          </React.Fragment>
        )}

        {cart.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title cart-title" style={{marginTop: 22}}>
              <span>In Cart</span>
              {!isFree && <span className="cart-total">{cartTotal}gc</span>}
            </div>
            <div className="gear-list">
              {cart.map((c, i) => {
                const name = c.kind === "gear" ? MR.EQUIP[c.key].name : `☩ ${MR.MUTATIONS[c.key].name}`;
                return (
                  <span key={i} className={"gear-pill cart-pill" + (c.kind === "mutation" ? " mutation-pill" : "")}>
                    {name} {!isFree && <span className="cost">{c.cost}gc</span>}
                    <span className="x" onClick={() => removeFromCart(i)} title="Remove from cart">✕</span>
                  </span>
                );
              })}
            </div>
          </React.Fragment>
        )}

        {melee.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title">Hand-to-hand</div>
            <div className="eq-grid">
              {melee.map(k => <EqTile key={k} k={k} gold={goldAfter} isFree={isFree} onClick={() => openDetail("gear", k)} />)}
            </div>
          </React.Fragment>
        )}
        {missile.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title">Missile</div>
            <div className="eq-grid">
              {missile.map(k => <EqTile key={k} k={k} gold={goldAfter} isFree={isFree} onClick={() => openDetail("gear", k)} />)}
            </div>
          </React.Fragment>
        )}
        {armour.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title">Armour</div>
            <div className="eq-grid">
              {armour.map(k => <EqTile key={k} k={k} gold={goldAfter} isFree={isFree} onClick={() => openDetail("gear", k)} />)}
            </div>
          </React.Fragment>
        )}
        {heroOnly.length > 0 && (
          <React.Fragment>
            <div className="eq-section-title">Holy Relics (Heroines only)</div>
            <div className="eq-grid">
              {heroOnly.map(k => <EqTile key={k} k={k} gold={goldAfter} isFree={isFree} onClick={() => openDetail("gear", k)} />)}
            </div>
          </React.Fragment>
        )}

        {warrior.canMutate && (
          <React.Fragment>
            <div className="eq-section-title" style={{color:"var(--blood-bright)"}}>Mutations of the Dark Gods</div>
            <p className="muted" style={{fontSize:14, fontStyle:"italic", marginBottom: 10}}>
              First mutation at listed cost. Each subsequent mutation costs double.
            </p>
            <div className="eq-grid">
              {Object.entries(MR.MUTATIONS).map(([k]) => {
                const cost = mutationCostFor(k);
                return (
                  <button key={k} className="eq-tile mutation-tile"
                          disabled={goldAfter < cost}
                          onClick={() => openDetail("mutation", k)}>
                    <span className="eq-name">{MR.MUTATIONS[k].name}</span>
                    <span className="eq-cost">{cost}gc</span>
                  </button>
                );
              })}
            </div>
          </React.Fragment>
        )}

        <div className="equip-footer">
          <button className="btn ghost" onClick={tryClose}>Cancel</button>
          {cart.length > 0 ? (
            <button className="btn primary" onClick={purchaseAndClose} disabled={!isFree && goldAfter < 0}>
              {isFree ? `Equip ${cart.length} item${cart.length === 1 ? "" : "s"}` : `Purchase · ${cartTotal}gc`}
            </button>
          ) : (
            <button className="btn" onClick={onClose}>Done</button>
          )}
        </div>

        {detail && (
          <DetailDialog
            detail={detail}
            warrior={warrior}
            mutationCostFor={mutationCostFor}
            goldAfter={goldAfter}
            isFree={isFree}
            onCancel={closeDetail}
            onAdd={() => addToCart(detail.kind, detail.key)}
          />
        )}

        {confirmCancel && (
          <ConfirmDialog
            title="Discard cart?"
            body={`You have ${cart.length} item${cart.length === 1 ? "" : "s"} in your cart worth ${cartTotal}gc. Leave without purchasing?`}
            confirmLabel="Discard"
            cancelLabel="Keep Shopping"
            onConfirm={() => { setConfirmCancel(false); setCart([]); onClose(); }}
            onCancel={() => setConfirmCancel(false)}
          />
        )}
      </div>
    </div>
  );
}

function DetailDialog({ detail, warrior, mutationCostFor, goldAfter, isFree, onCancel, onAdd }) {
  const isGear = detail.kind === "gear";
  const item = isGear ? MR.EQUIP[detail.key] : MR.MUTATIONS[detail.key];
  const cost = isFree ? 0 : (isGear ? item.cost : mutationCostFor(detail.key));
  const canAfford = isFree || goldAfter >= cost;
  const s = isGear ? (item.stats || {}) : null;
  const rules = isGear ? (item.special || []) : null;

  return (
    <div className="detail-backdrop" onClick={onCancel}>
      <div className="detail-card" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onCancel}>✕</button>
        <div className="detail-eyebrow">
          {isGear ? typeLabelFull(item.type) : "Mutation of the Dark Gods"}
        </div>
        <h3 className="detail-title">{isGear ? item.name : `☩ ${item.name}`}</h3>
        <div className="detail-cost">
          {isFree
            ? <span className="detail-cost-v" style={{color:"var(--hs-free-color,#80c090)"}}>Free</span>
            : <React.Fragment>
                <span className="detail-cost-v">{cost}</span>
                <span className="detail-cost-u">gold crowns</span>
              </React.Fragment>
          }
        </div>

        {isGear && (s.range || s.str || s.saveMod || s.save) && (
          <div className="detail-stats">
            {s.range !== undefined && <DetailStat l="Range" v={s.range} />}
            {s.str !== undefined && <DetailStat l="Strength" v={s.str} />}
            {s.saveMod !== undefined && <DetailStat l="Save mod" v={s.saveMod} />}
            {s.save !== undefined && <DetailStat l="Armour save" v={s.save} />}
          </div>
        )}

        {isGear && rules.length > 0 && (
          <div className="detail-rules">
            {rules.map(rk => {
              const r = MR.RULES[rk];
              if (!r) return null;
              return (
                <div key={rk} className="detail-rule">
                  <div className="detail-rule-name">{r.name}</div>
                  <div className="detail-rule-desc">{r.desc}</div>
                </div>
              );
            })}
          </div>
        )}

        {!isGear && (
          <div className="detail-rules">
            <div className="detail-rule">
              <div className="detail-rule-desc detail-rule-desc-solo">{item.desc}</div>
            </div>
          </div>
        )}

        <div className="detail-footer">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn primary" onClick={onAdd} disabled={!canAfford}>
            {isFree ? "Add to Loadout" : (canAfford ? "Add to Cart" : "Not Enough Gold")}
          </button>
        </div>
      </div>
    </div>
  );
}

function DetailStat({ l, v }) {
  return (
    <div className="detail-stat">
      <span className="detail-stat-l">{l}</span>
      <span className="detail-stat-v">{v}</span>
    </div>
  );
}

function typeLabelFull(t) {
  return t === "melee" ? "Hand-to-hand Weapon"
       : t === "missile" ? "Missile Weapon"
       : t === "armour" ? "Armour"
       : t === "misc" ? "Sacred Item" : "Equipment";
}

function ConfirmDialog({ title, body, confirmLabel = "Confirm", cancelLabel = "Cancel", onConfirm, onCancel }) {
  return (
    <div className="detail-backdrop" onClick={onCancel}>
      <div className="detail-card confirm-card" onClick={e => e.stopPropagation()}>
        <h3 className="detail-title" style={{textAlign:"center"}}>{title}</h3>
        <p style={{textAlign:"center", color:"var(--ink-dim)", fontSize: 15, lineHeight: 1.5, margin: "12px 0 22px"}}>{body}</p>
        <div className="detail-footer">
          <button className="btn ghost" onClick={onCancel}>{cancelLabel}</button>
          <button className="btn primary" onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

function EqTile({ k, gold, isFree, onClick }) {
  const it = MR.EQUIP[k];
  const cantAfford = !isFree && gold < it.cost;
  return (
    <button className={"eq-tile" + (isFree ? " eq-tile-free" : "")} disabled={cantAfford} onClick={onClick}>
      <span className="eq-name">{it.name}</span>
      <span className="eq-cost">{isFree ? "Free" : `${it.cost}gc`}</span>
    </button>
  );
}

// ── XpBar ─────────────────────────────────────────────────────────
function XpBar({ warrior, onAdjust, onAdvance }) {
  const pending = pendingAdvances(warrior);
  const next = nextThreshold(warrior.xp, xpTable(warrior));
  return (
    <div className="xp-bar">
      <div className="xp-bar-left">
        <span className="xp-bar-label">XP</span>
        <span className="xp-bar-val">{warrior.xp || 0}</span>
        <button className="xp-step" onClick={() => onAdjust(1)}>+1</button>
        <button className="xp-step" onClick={() => onAdjust(5)}>+5</button>
        <button className="xp-step" onClick={() => onAdjust(10)}>+10</button>
        {(warrior.xp || 0) > 0 && (
          <button className="xp-step xp-step-minus" onClick={() => onAdjust(-1)}>−1</button>
        )}
      </div>
      <div className="xp-bar-right">
        {next && <span className="xp-next">next advance at {next} XP</span>}
        {pending > 0 && (
          <button className="advance-badge" onClick={onAdvance}>
            ✦ {pending} Advance{pending > 1 ? "s" : ""} Ready!
          </button>
        )}
      </div>
    </div>
  );
}

// ── AdvancementModal ──────────────────────────────────────────────
function AdvancementModal({ warrior, isGroup, groupSize, onApply, onClose }) {
  const [mode, setMode] = useStateR(null); // null | 'skill' | 'stat' | 'lads' | 'spell'
  const [selectedSkill, setSelectedSkill] = useStateR(null);
  const [selectedStat, setSelectedStat] = useStateR(null);
  const [skillDetail, setSkillDetail] = useStateR(null);
  const [selectedSpell, setSelectedSpell] = useStateR(null);
  const [spellDetail, setSpellDetail] = useStateR(null);

  const pending = pendingAdvances(warrior);
  const isHero = warrior.role === "Hero";

  // Build available skills by category (heroes only)
  const categories = isHero ? (warrior.customSkillCategories || MR.HERO_SKILL_CATEGORIES[warrior.unitId] || []) : [];
  const skillsByCategory = useMemoR(() => {
    if (!isHero) return {};
    const byCat = {};
    categories.forEach(cat => { byCat[cat] = []; });
    Object.entries(MR.SKILLS).forEach(([k, s]) => {
      if (categories.includes(s.category) && !(warrior.skills || []).includes(k)) {
        byCat[s.category].push({ key: k, ...s });
      }
    });
    return byCat;
  }, [warrior.skills, categories]);

  const statOptions = isHero ? MR.HERO_STAT_ADVANCES : MR.HENCH_STAT_ADVANCES;

  // Spell learning (wizards only)
  const school = spellSchool(warrior);
  const availableSpells = useMemoR(() => {
    if (!school) return [];
    const known = warrior.knownSpells || [];
    return Object.entries(MR.SPELLS)
      .filter(([k, s]) => s.school === school && !known.includes(k))
      .map(([k, s]) => ({ key: k, ...s }));
  }, [school, warrior.knownSpells]);

  const canConfirm = (mode === "skill" && selectedSkill) || (mode === "stat" && selectedStat !== null) || mode === "lads" || (mode === "spell" && selectedSpell);

  const confirm = () => {
    if (mode === "skill" && selectedSkill) {
      onApply({ type: "skill", key: selectedSkill });
    } else if (mode === "stat" && selectedStat !== null) {
      onApply({ type: "stat", idx: selectedStat });
    } else if (mode === "lads") {
      onApply({ type: "ladsGotTalent" });
    } else if (mode === "spell" && selectedSpell) {
      onApply({ type: "spell", key: selectedSpell });
    }
  };

  const statLabel = (idx) => {
    const val = warrior.profile[idx];
    return val !== undefined ? `${MR.STAT_LABELS[idx]} · was ${val} → ${val + 1}` : MR.STAT_LABELS[idx];
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal advance-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Advancement</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>
          {warrior.name}
          {isGroup && groupSize > 1 && <React.Fragment>
            <span style={{color:"var(--ink-faint)", margin:"0 6px"}}>·</span>
            {groupSize} warriors advance
          </React.Fragment>}
          <span style={{color:"var(--ink-faint)", margin:"0 6px"}}>·</span>
          <span style={{color:"var(--candle)"}}>{warrior.xp} XP</span>
          <span style={{color:"var(--ink-faint)", margin:"0 6px"}}>·</span>
          <span style={{color:"var(--blood-bright)"}}>{pending} advance{pending !== 1 ? "s" : ""} ready</span>
        </p>

        {/* Mode selector — heroes get Skill / Stat (+ Spell for wizards); henchman groups get Stat / Lad's Got Talent */}
        {isHero && !isGroup && (
          <div className="adv-mode-btns">
            <button
              className={"adv-mode-btn" + (mode === "skill" ? " active" : "")}
              onClick={() => { setMode("skill"); setSelectedStat(null); setSelectedSpell(null); setSpellDetail(null); }}>
              <span className="adv-mode-icon">✦</span>
              <span className="adv-mode-label">New Skill</span>
              <span className="adv-mode-sub">Choose from your skill lists</span>
            </button>
            {school && availableSpells.length > 0 && (
              <button
                className={"adv-mode-btn" + (mode === "spell" ? " active" : "")}
                onClick={() => { setMode("spell"); setSelectedStat(null); setSelectedSkill(null); setSkillDetail(null); }}>
                <span className="adv-mode-icon">✧</span>
                <span className="adv-mode-label">Learn a Spell</span>
                <span className="adv-mode-sub">{school}</span>
              </button>
            )}
            <button
              className={"adv-mode-btn" + (mode === "stat" ? " active" : "")}
              onClick={() => { setMode("stat"); setSelectedSkill(null); setSkillDetail(null); setSelectedSpell(null); setSpellDetail(null); }}>
              <span className="adv-mode-icon">↑</span>
              <span className="adv-mode-label">Improve Stat</span>
              <span className="adv-mode-sub">Increase a characteristic by +1</span>
            </button>
          </div>
        )}
        {isGroup && (
          <div className="adv-mode-btns">
            <button
              className={"adv-mode-btn" + (mode === "stat" ? " active" : "")}
              onClick={() => { setMode("stat"); setSelectedStat(null); }}>
              <span className="adv-mode-icon">↑</span>
              <span className="adv-mode-label">Improve Stat</span>
              <span className="adv-mode-sub">+1 characteristic for all members</span>
            </button>
            <button
              className={"adv-mode-btn" + (mode === "lads" ? " active" : "")}
              onClick={() => setMode("lads")}>
              <span className="adv-mode-icon">★</span>
              <span className="adv-mode-label">Lad's Got Talent</span>
              <span className="adv-mode-sub">Elevate one warrior to Hero</span>
            </button>
          </div>
        )}

        {/* Lad's Got Talent info panel */}
        {mode === "lads" && (
          <div className="lads-panel">
            <p>One warrior separates from the group and is elevated to <strong>Hero</strong> status.</p>
            <ul>
              <li>Keeps all characteristic increases, XP, and equipment.</li>
              <li>You choose <strong>2 skill lists</strong> (Combat, Shooting, Academic, Strength, or Speed) that this hero can draw from in future.</li>
              <li>Immediately makes <strong>one roll</strong> on the Heroes Advance table.</li>
              <li>
                {groupSize > 1
                  ? <React.Fragment>The remaining <strong>{groupSize - 1}</strong> warrior{groupSize - 1 !== 1 ? "s" : ""} still advance — they roll again.</React.Fragment>
                  : <React.Fragment>This is the <strong>last member</strong> — the group will be disbanded.</React.Fragment>
                }
              </li>
            </ul>
          </div>
        )}

        {/* Skill picker */}
        {mode === "skill" && (
          <div className="adv-skill-section">
            {Object.entries(skillsByCategory).map(([cat, skills]) => skills.length === 0 ? null : (
              <div key={cat} className="skill-category">
                <div className="skill-cat-title">{cat}</div>
                <div className="skill-grid">
                  {skills.map(s => (
                    <button
                      key={s.key}
                      className={"skill-tile" + (selectedSkill === s.key ? " selected" : "")}
                      onClick={() => { setSelectedSkill(s.key); setSkillDetail(s); }}>
                      <div className="skill-tile-name">{s.name}</div>
                    </button>
                  ))}
                </div>
              </div>
            ))}
            {skillDetail && (
              <div className="skill-detail">
                <div className="skill-detail-name">✦ {skillDetail.name}</div>
                <div className="skill-detail-desc">{skillDetail.desc}</div>
              </div>
            )}
          </div>
        )}

        {/* Spell picker (wizards only) */}
        {mode === "spell" && (
          <div className="adv-skill-section">
            <div className="skill-category">
              <div className="skill-cat-title">{school}</div>
              <div className="skill-grid">
                {availableSpells.map(sp => (
                  <button
                    key={sp.key}
                    className={"skill-tile" + (selectedSpell === sp.key ? " selected" : "")}
                    onClick={() => { setSelectedSpell(sp.key); setSpellDetail(sp); }}>
                    <div className="skill-tile-name">{sp.name}</div>
                    <div className="skill-tile-sub" style={{ fontSize: "0.7rem", color: "var(--ink-faint)" }}>Cast {sp.castRoll}+</div>
                  </button>
                ))}
              </div>
            </div>
            {spellDetail && (
              <div className="skill-detail">
                <div className="skill-detail-name">✧ {spellDetail.name}
                  <span style={{ fontWeight: "normal", marginLeft: 8, fontSize: "0.8rem", color: "var(--ink-muted)" }}>
                    Cast {spellDetail.castRoll}+ · {spellDetail.range}
                  </span>
                </div>
                <div className="skill-detail-desc">{spellDetail.desc}</div>
              </div>
            )}
          </div>
        )}

        {/* Stat picker */}
        {mode === "stat" && (
          <div className="adv-stat-section">
            {isGroup && (
              <p className="adv-group-note">
                This improvement applies to all {groupSize} warriors in this group.
              </p>
            )}
            <div className="stat-advance-grid">
              {statOptions.map(opt => (
                <button
                  key={opt.idx}
                  className={"stat-advance-tile" + (selectedStat === opt.idx ? " selected" : "")}
                  onClick={() => setSelectedStat(opt.idx)}>
                  <div className="sat-stat">{MR.STAT_LABELS[opt.idx]}</div>
                  <div className="sat-label">{opt.label}</div>
                  <div className="sat-change">{warrior.profile[opt.idx]} → {warrior.profile[opt.idx] + 1}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="detail-footer" style={{marginTop: 28}}>
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!canConfirm} onClick={confirm}>
            {mode === "skill" && selectedSkill
              ? `Take Skill — ${MR.SKILLS[selectedSkill]?.name}`
              : mode === "spell" && selectedSpell
              ? `Learn Spell — ${MR.SPELLS[selectedSpell]?.name}`
              : mode === "stat" && selectedStat !== null
              ? `+1 ${MR.STAT_LABELS[selectedStat]} — Confirm`
              : mode === "lads"
              ? "Elevate to Hero — Confirm"
              : "Choose Advancement"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── LadsTalentCategoryModal ───────────────────────────────────────
// Shown immediately after a henchman is promoted via Lad's Got Talent.
// The player picks exactly 2 skill lists that this new hero can draw from.
const ALL_SKILL_LISTS = ["Combat", "Shooting", "Academic", "Strength", "Speed"];

function LadsTalentCategoryModal({ warrior, onApply, onClose }) {
  const [selected, setSelected] = useStateR([]);

  const toggle = (cat) => {
    setSelected(prev => {
      if (prev.includes(cat)) return prev.filter(c => c !== cat);
      if (prev.length >= 2) return prev; // already have 2
      return [...prev, cat];
    });
  };

  const canConfirm = selected.length === 2;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal advance-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Lad's Got Talent</h2>
        <p className="epigraph muted" style={{ textAlign: "center" }}>
          {warrior.name} joins the heroes
          <span style={{ color: "var(--ink-faint)", margin: "0 6px" }}>·</span>
          <span style={{ color: "var(--candle-bright)" }}>Choose 2 skill lists</span>
        </p>

        <p style={{ textAlign: "center", fontSize: "0.85rem", color: "var(--ink-muted)", marginBottom: 16 }}>
          These are the skill lists this hero may draw from when gaining new skills.
        </p>

        <div className="adv-mode-btns" style={{ flexWrap: "wrap", gap: 10 }}>
          {ALL_SKILL_LISTS.map(cat => (
            <button
              key={cat}
              className={"adv-mode-btn" + (selected.includes(cat) ? " active" : "")}
              style={{ flex: "1 1 calc(33% - 10px)", minWidth: 100 }}
              onClick={() => toggle(cat)}>
              <span className="adv-mode-label">{cat}</span>
            </button>
          ))}
        </div>

        <div className="detail-footer" style={{ marginTop: 28 }}>
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn primary" disabled={!canConfirm} onClick={() => onApply(selected)}>
            {canConfirm ? `Confirm — ${selected.join(" & ")}` : `Choose ${2 - selected.length} more`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SpellbookModal ────────────────────────────────────────────────
function SpellbookModal({ warrior, onToggle, onClose }) {
  const school = spellSchool(warrior);
  if (!school) return null;
  const spells = Object.entries(MR.SPELLS).filter(([k, s]) => s.school === school);
  const known = warrior.knownSpells || [];

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal spellbook-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>{warrior.name}</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>
          {warrior.title}
          <span style={{margin:"0 8px", color:"var(--ink-faint)"}}>·</span>
          <span className="spell-school-tag">{school}</span>
        </p>
        <div className="spell-grid">
          {spells.map(([key, sp]) => {
            const isKnown = known.includes(key);
            return (
              <button

function HiredSwordsModal({ warband, def, onClose, onHire }) {
  const faction = def.id;

  const canHireByFaction = (hsDef) => {
    if (hsDef.allowedHire) return hsDef.allowedHire.includes(faction);
    if (hsDef.cannotHire)  return !hsDef.cannotHire.includes(faction);
    return true;
  };
  const alreadyHired = (hsDef) => warband.warriors.some(w => w.hiredSwordId === hsDef.id);
  const atMax = warband.warriors.length >= effectiveMaxW(warband, def);
  const CONFLICTS = { highwayman: "roadwarden", roadwarden: "highwayman" };
  const isConflicted = (hsDef) => {
    const rival = CONFLICTS[hsDef.id];
    return rival ? warband.warriors.some(w => w.hiredSwordId === rival) : false;
  };

  const getStatus = (hsDef) => {
    if (alreadyHired(hsDef))         return "hired";
    if (isConflicted(hsDef))         return "conflicted";
    if (!canHireByFaction(hsDef))    return "restricted";
    if (atMax)                       return "full";
    if (warband.gold < hsDef.cost)   return "broke";
    return "available";

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal hs-modal" onClick={e => e.stopPropagation()}>

          Treasury <span style={{color:"var(--candle)"}}>{warband.gold}gc</span>
        </p>
        <p className="muted" style={{fontSize:13, fontStyle:"italic", textAlign:"center", marginBottom:18}}>
          Pay the hire fee now. Each hired sword demands upkeep after every battle.

        <div className="hs-grid">
          {MR.HIRED_SWORDS.map(hsDef => {

                  <div>
                    <span className="hs-name">{hsDef.name}</span>
                    <span className="hs-source-tag">{hsDef.source}</span>
                  </div>
                  <div className="hs-cost-row">
                    <strong>{hsDef.cost}gc</strong> hire · <span className="hs-upkeep-text">{hsDef.upkeep}gc/battle</span>
                  </div>
                </div>

                <div className="hs-fluff">{hsDef.fluff}</div>

                <div className="statline hs-statline">
                  {hsDef.profile.map((v, i) => (
                    <div className="stat" key={i} title={MR.STAT_NAMES[i]}>
                      <div className="sl-l">{MR.STAT_LABELS[i]}</div>
                      <div className="sl-v" style={{fontSize:12}}>{v}</div>

                    {hsDef.rules.map((r, i) => (
                      <Tip key={i} className="rule-tag" content={ruleTip(r)}>
                        {MR.RULES[r]?.name || r}
                      </Tip>
                    ))}
                  </div>

                <div className="hs-skills">Advances: {hsDef.skillCategories}</div>

                <div className="hs-tile-footer">

// ── HireMoreModal ─────────────────────────────────────────────────
function HireMoreModal({ members, unitDef, warband, def, onClose, onHire }) {
  const currentGroupCount = members.length;
  const currentTypeCount = warband.warriors.filter(x => x.unitId === unitDef.id).length;
  const typeRemaining = unitDef.max !== undefined ? Math.max(0, unitDef.max - currentTypeCount) : Infinity;
  const warbandRemaining = effectiveMaxW(warband, def) - warband.warriors.length;
  const budgetMax = Math.floor(warband.gold / unitDef.cost);
  const maxHire = Math.min(typeRemaining, warbandRemaining, budgetMax);
  const canHire = maxHire >= 1;

  const [count, setCount] = useStateR(1);
  const safeCount = Math.min(Math.max(1, count), Math.max(1, maxHire));
  const totalCost = safeCount * unitDef.cost;
  const pipCount = Math.min(maxHire, 10);

  const blockReason = !canHire
    ? (warband.gold < unitDef.cost ? "Not enough gold to hire more." : "Warband is at maximum size.")
    : null;

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="detail-card hire-card" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="detail-eyebrow">Hiring Additional Henchmen</div>
        <h3 className="detail-title">{members[0].groupName || unitDef.title}</h3>
        <p style={{textAlign:"center", color:"var(--ink-dim)", fontSize:15, lineHeight:1.5, marginBottom:20}}>
          Current group: <strong style={{color:"var(--candle)"}}>{currentGroupCount}</strong> warrior{currentGroupCount !== 1 ? "s" : ""}
          <span style={{margin:"0 8px", color:"var(--ink-faint)"}}>·</span>
          {unitDef.cost}gc each
        </p>

        {blockReason && (
          <p style={{textAlign:"center", color:"var(--blood-bright)", fontSize:14, fontStyle:"italic", marginBottom:20}}>
            {blockReason}
          </p>
        )}

        {canHire && (
          <React.Fragment>
            <div className="hire-counter">
              <button className="hire-step" onClick={() => setCount(c => Math.max(1, c - 1))} disabled={safeCount <= 1}>−</button>
              <div className="hire-value">{safeCount}</div>
              <button className="hire-step" onClick={() => setCount(c => Math.min(maxHire, c + 1))} disabled={safeCount >= maxHire}>+</button>
            </div>

            {pipCount > 1 && (
              <div className="hire-pips">
                {Array.from({length: pipCount}, (_, i) => (
                  <button key={i}
                          className={"hire-pip" + (i < safeCount ? " on" : "")}
                          onClick={() => setCount(i + 1)}
                          title={`${i + 1}`}>{i + 1}</button>
                ))}
              </div>
            )}

            <div className="hire-summary">
              <div className="hire-row">
                <span className="hire-label">Cost per warrior</span>
                <span className="hire-val">{unitDef.cost}gc</span>
              </div>
              <div className="hire-row hire-row-total">
                <span className="hire-label">Total</span>
                <span className="hire-val candle">{totalCost}gc</span>
              </div>
              <div className="hire-row">
                <span className="hire-label">Group size after</span>
                <span className="hire-val">{currentGroupCount + safeCount}</span>
              </div>
              {unitDef.max !== undefined && (
                <div className="hire-row">
                  <span className="hire-label muted">Type quota after</span>
                  <span className="hire-val muted">{currentTypeCount + safeCount} / {unitDef.max}</span>
                </div>
              )}
            </div>
          </React.Fragment>
        )}

        <div className="detail-footer">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          {canHire && (
            <button className="btn primary" onClick={() => onHire(safeCount)}>
              Hire {safeCount} · {totalCost}gc
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── StockpileModal ────────────────────────────────────────────────
function StockpileModal({ warband, onClose, onGive, onSell }) {
  const [giveIdx, setGiveIdx] = useStateR(null); // stockpile index being assigned
  const stockpile = warband.stockpile || [];

  const handleSell = (idx) => {
    onSell(idx);
    // Adjust giveIdx if the sold item was before it in the list
    if (giveIdx === idx) setGiveIdx(null);
    else if (giveIdx !== null && giveIdx > idx) setGiveIdx(giveIdx - 1);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal stockpile-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Warband Stockpile</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>
          Items held in reserve — equip to a warrior or sell for half price.
        </p>

        {stockpile.length === 0 ? (
          <div className="muted" style={{textAlign:"center", fontStyle:"italic", padding:"28px 0"}}>
            The stockpile is empty.
          </div>
        ) : (
          <div className="stockpile-list">
            {stockpile.map((si, idx) => {
              const item = MR.EQUIP[si.key];
              if (!item) return null;
              const sellPrice = Math.floor((si.paidCost || item.cost || 0) / 2);
              return (
                <div key={idx} className="stockpile-item-row">
                  <div className="stockpile-item-info">
                    <span className="stockpile-item-name">{item.name}</span>
                    <span className="stockpile-item-paid">paid {si.paidCost || item.cost}gc</span>
                  </div>
                  <div className="stockpile-item-actions">
                    <button className="btn sm" onClick={() => setGiveIdx(idx === giveIdx ? null : idx)}>
                      Give to Warrior
                    </button>
                    <button className="btn sm ghost dismiss-btn" onClick={() => handleSell(idx)}>
                      Sell · {sellPrice}gc
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div className="detail-footer" style={{marginTop:20}}>
          <button className="btn primary" onClick={onClose}>Done</button>
        </div>

        {giveIdx !== null && (() => {
          const si = stockpile[giveIdx];
          const item = si ? MR.EQUIP[si.key] : null;
          if (!item) return null;
          return (
            <GiveStockpileDialog
              item={item}
              warband={warband}
              onClose={() => setGiveIdx(null)}
              onGive={(warriorId) => { onGive(giveIdx, warriorId); setGiveIdx(null); }}
            />
          );
        })()}
      </div>
    </div>
  );
}

function TradingPostModal({ warband, def, onClose, onBuy }) {
  const [detail, setDetail] = useStateR(null);       // tpItem.key being viewed
  const [assignFor, setAssignFor] = useStateR(null); // { key, cost }
  const [openSections, setOpenSections] = useStateR({ melee: false, missile: false, blackpowder: false, armour: false, misc: false });
  const toggleSection = (key) => setOpenSections(prev => ({ ...prev, [key]: !prev[key] }));
  const faction = def.id;
  const meleeItems      = MR.TRADING_POST.melee       || [];
  const missileItems    = MR.TRADING_POST.missile     || [];
  const blackpowderItems= MR.TRADING_POST.blackpowder || [];
  const armourItems     = MR.TRADING_POST.armour      || [];
  const miscItems       = MR.TRADING_POST.misc        || [];
  const allTpItems      = [...meleeItems, ...missileItems, ...blackpowderItems, ...armourItems, ...miscItems];

  const isAllowed = (tpItem) => !tpItem.factions || tpItem.factions.includes(faction);

  const factionName = (ids) => {
    if (!ids || ids.length === 0) return "";
    if (ids.length === 1) return MR.WARBANDS[ids[0]]?.name || ids[0];
    return ids.map(id => MR.WARBANDS[id]?.name || id).join(" & ");
  };

  const renderTiles = (items) => items.map(tpItem => {
    const item = MR.EQUIP[tpItem.key];
    if (!item) return null;
    const allowed    = isAllowed(tpItem);
    const common     = tpItem.availability === "Common";
    const cantAfford = warband.gold < item.cost;
    return (
      <button
        key={tpItem.key}
        className={"eq-tile tp-tile" + (!allowed ? " tp-tile-restricted" : "")}
        onClick={() => setDetail(tpItem.key)}>
        <div className="tp-tile-left">
          <span className="eq-name">{item.name}</span>
          <span className={"tp-avail " + (common ? "tp-avail-common" : "tp-avail-rare")}>
            {common ? "Common" : `Rare ${tpItem.availability}`}
          </span>
        </div>
        <span className="eq-cost">
          {!allowed
            ? <span className="tp-tile-status">Restricted</span>
            : cantAfford
            ? <span className="tp-tile-status tp-tile-broke-cost">Need {item.cost}gc</span>
            : `${item.cost}gc`}
        </span>
      </button>
    );
  });

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal tp-modal equip-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>Trading Post</h2>
        <p className="epigraph muted" style={{textAlign:"center"}}>
          Merchants peddle their wares amid the ruins of Mordheim.
          <span style={{margin:"0 8px", color:"var(--rule-gold)"}}>·</span>
          Treasury <span style={{color:"var(--candle)"}}>{warband.gold}gc</span>
        </p>
        {warband.stockpile?.length > 0 && (
          <p className="muted" style={{textAlign:"center", fontSize:13, marginTop:4}}>
            Stockpile: <strong style={{color:"var(--candle)"}}>{warband.stockpile.length}</strong> item{warband.stockpile.length !== 1 ? "s" : ""} stored
          </p>
        )}

        <button className="tp-section-header" onClick={() => toggleSection("melee")} style={{marginTop:20}}>
          <span>Hand-to-Hand Combat Weapons</span>
          <span className={"tp-chevron" + (openSections.melee ? " tp-chevron-open" : "")}>›</span>
        </button>
        {openSections.melee && <div className="eq-grid tp-section-grid">{renderTiles(meleeItems)}</div>}

        <button className="tp-section-header" onClick={() => toggleSection("missile")}>
          <span>Missile Weapons</span>
          <span className={"tp-chevron" + (openSections.missile ? " tp-chevron-open" : "")}>›</span>
        </button>
        {openSections.missile && <div className="eq-grid tp-section-grid">{renderTiles(missileItems)}</div>}

        <button className="tp-section-header" onClick={() => toggleSection("blackpowder")}>
          <span>Blackpowder Weapons</span>
          <span className={"tp-chevron" + (openSections.blackpowder ? " tp-chevron-open" : "")}>›</span>
        </button>
        {openSections.blackpowder && <div className="eq-grid tp-section-grid">{renderTiles(blackpowderItems)}</div>}

        <button className="tp-section-header" onClick={() => toggleSection("armour")}>
          <span>Armour</span>
          <span className={"tp-chevron" + (openSections.armour ? " tp-chevron-open" : "")}>›</span>
        </button>
        {openSections.armour && <div className="eq-grid tp-section-grid">{renderTiles(armourItems)}</div>}

        <button className="tp-section-header" onClick={() => toggleSection("misc")}>
          <span>Miscellaneous Equipment</span>
          <span className={"tp-chevron" + (openSections.misc ? " tp-chevron-open" : "")}>›</span>
        </button>
        {openSections.misc && <div className="eq-grid tp-section-grid">{renderTiles(miscItems)}</div>}

        <div className="equip-footer">
          <button className="btn ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={onClose}>Done</button>
        </div>

        {detail && (() => {
          const tpItem = allTpItems.find(t => t.key === detail);
          const item = MR.EQUIP[detail];
          if (!tpItem || !item) return null;
          const allowed    = isAllowed(tpItem);
          const cantAfford = warband.gold < item.cost;
          return (
            <TpDetailDialog
              item={item}
              tpItem={tpItem}
              allowed={allowed}
              cantAfford={cantAfford}
              factionName={factionName}
              onCancel={() => setDetail(null)}
              onPurchase={() => { setDetail(null); setAssignFor({ key: detail, cost: item.cost }); }}
            />
          );
        })()}

        {assignFor && (
          <AssignItemModal
            itemKey={assignFor.key}
            cost={assignFor.cost}
            warband={warband}
            onClose={() => setAssignFor(null)}
            onAssign={(targetId) => { onBuy(assignFor.key, assignFor.cost, targetId); setAssignFor(null); }} />
        )}
      </div>
    </div>
  );
}

// ── TpDetailDialog — item detail overlay for Trading Post ─────────
function TpDetailDialog({ item, tpItem, allowed, cantAfford, factionName, onCancel, onPurchase }) {
  const s = item.stats || {};
  const common = tpItem.availability === "Common";
  const hasStats = s.range !== undefined || s.str !== undefined || s.saveMod !== undefined || s.save !== undefined;
  const hasRules = item.special && item.special.length > 0;

  return (
    <div className="detail-backdrop" onClick={onCancel}>
      <div className="detail-card" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onCancel}>✕</button>
        <div className="detail-eyebrow">
          {typeLabelFull(item.type)}
          <span className={"tp-avail " + (common ? "tp-avail-common" : "tp-avail-rare")}
                style={{marginLeft:10, verticalAlign:"middle"}}>
            {common ? "Common" : `Rare ${tpItem.availability}`}
          </span>
        </div>
        <h3 className="detail-title">{item.name}</h3>
        <div className="detail-cost">
          <span className="detail-cost-v">{item.cost}</span>
          <span className="detail-cost-u">gold crowns</span>
        </div>

        {hasStats && (
          <div className="detail-stats">
            {s.range !== undefined && <DetailStat l="Range" v={s.range} />}
            {s.str !== undefined && <DetailStat l="Strength" v={s.str} />}
            {s.saveMod !== undefined && <DetailStat l="Save mod" v={s.saveMod} />}
            {s.save !== undefined && <DetailStat l="Armour save" v={s.save} />}
          </div>
        )}

        {hasRules && (
          <div className="detail-rules">
            {item.special.map(rk => {
              const r = MR.RULES[rk];
              if (!r) return null;
              return (
                <div key={rk} className="detail-rule">
                  <div className="detail-rule-name">{r.name}</div>
                  <div className="detail-rule-desc">{r.desc}</div>
                </div>
              );
            })}
          </div>
        )}

        {!allowed && (
          <div className="detail-rules">
            <div className="detail-rule" style={{borderLeftColor:"var(--blood)"}}>
              <div className="detail-rule-desc" style={{color:"var(--blood-bright)", fontStyle:"normal"}}>
                ⚠ Restricted to {factionName(tpItem.factions)} only.
              </div>
            </div>
          </div>
        )}

        <div className="detail-footer">
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
          <button className="btn primary" onClick={onPurchase} disabled={!allowed || cantAfford}>
            {!allowed ? "Faction Restricted"
              : cantAfford ? `Need ${item.cost}gc`
              : `Purchase · ${item.cost}gc`}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Print Roster ──────────────────────────────────────────────────
function printRoster(warband, def) {
  const MR = window.MORDHEIM;
  const SL = MR.STAT_LABELS; // ["M","WS","BS","S","T","W","I","A","Ld"]

  const heroes    = warband.warriors.filter(w => w.role === "Hero" || w.role === "HiredSword");
  const henchmen  = warband.warriors.filter(w => w.role === "Henchman");

  // group henchmen by groupId
  const seenG = new Set();
  const henchGroups = [];
  henchmen.forEach(w => {
    const k = w.groupId || w.id;
    if (!seenG.has(k)) { seenG.add(k); henchGroups.push(henchmen.filter(x => (x.groupId || x.id) === k)); }
  });

  const totalXp  = warband.warriors.reduce((s, w) => s + (w.xp || 0), 0);
  const dpRating = [...new Set(warband.warriors.filter(x => x.isDramatisPersonae).map(x => x.dpId))]
    .reduce((s, id) => s + (MR.DRAMATIS_PERSONAE.find(d => d.id === id)?.ratingBonus || 0), 0);
  const rating   = warband.warriors.length * 5 + totalXp + dpRating;

  function e(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function gearHtml(warrior) {
    const items = warrior.gear.map(g => e(MR.EQUIP[g.key]?.name || g.key));
    const muts  = (warrior.mutations || []).map(m => e('☩ ' + (MR.MUTATIONS[m.key]?.name || m.key)));
    const all   = [...items, ...muts];
    return all.length ? all.join('<br>') : '<span class="nd">—</span>';
  }

  function skillsHtml(warrior) {
    const sk  = (warrior.skills || []).map(k => e(MR.SKILLS[k]?.name || k));
    const sp  = (warrior.knownSpells || []).map(k => e('✧ ' + (MR.SPELLS[k]?.name || k)));
    const inj = (warrior.injuries || []).map(i => {
      const d = MR.INJURIES.find(x => x.key === i.key);
      return '<span class="inj-tag">† ' + e(d?.name || i.key) + '</span>';
    });
    const all = [...sk, ...sp, ...inj];
    return all.length ? all.join('<br>') : '<span class="nd">—</span>';
  }

  function rulesHtml(rules) {
    return rules && rules.length ? rules.map(e).join('<br>') : '<span class="nd">—</span>';
  }

  function statTableHtml(profile, xp, xpLabel) {
    const ths = SL.map(l => `<th>${e(l)}</th>`).join('') + `<th class="xp-th">${e(xpLabel || 'XP')}</th>`;
    const tds = profile.map(v => `<td>${v}</td>`).join('') + `<td class="xp-td">${xp || 0}</td>`;
    return `<table class="stat-table"><tr class="stat-head">${ths}</tr><tr class="stat-vals">${tds}</tr></table>`;
  }

  function heroCardHtml(w) {
    const isHS    = w.role === "HiredSword";
    const subType = isHS ? `${e(w.title)} &middot; Hired Sword` : e(w.title);
    const costStr = isHS ? `${w.upkeep}gc upkeep/battle` : `${w.cost}gc recruit`;
    const rulesOnly = (w.rules || []).filter(r => !['Wizard','Prayers of Sigmar','Wizard — Necromancy','Wizard — Horned Rat'].includes(r));
    const notesBlock = w.notes
      ? `<div class="card-usernote">${e(w.notes)}</div>` : '';

    return `
<div class="print-card">
  <div class="card-top">
    <div class="col-name">
      <div class="wname">${e(w.name)}</div>
      <div class="wtype">${subType}</div>
      <div class="wcost">${costStr}</div>
    </div>
    <div class="col-equip">
      <div class="col-lbl">Equipment</div>
      <div class="col-body">${gearHtml(w)}</div>
    </div>
    <div class="col-skills">
      <div class="col-lbl">Skills / Injuries / Etc.</div>
      <div class="col-body">${skillsHtml(w)}${rulesOnly.length ? '<br>' + rulesOnly.map(e).join('<br>') : ''}</div>
      ${notesBlock}
    </div>
  </div>
  ${statTableHtml(w.profile, w.xp, 'XP')}
</div>`;
  }

  function henchCardHtml(members) {
    const lead      = members[0];
    const groupName = lead.groupName || lead.title;
    // aggregate unique equipment across group members
    const allGear = new Set();
    members.forEach(m => {
      m.gear.forEach(g => { const n = MR.EQUIP[g.key]?.name; if (n) allGear.add(n); });
      (m.mutations || []).forEach(mu => { const n = MR.MUTATIONS[mu.key]?.name; if (n) allGear.add('☩ ' + n); });
    });
    const gearText = allGear.size ? [...allGear].map(e).join('<br>') : '<span class="nd">—</span>';
    // skills + rules for the group (shared via group advancement)
    const sk = (lead.skills || []).map(k => e(MR.SKILLS[k]?.name || k));
    const rl = (lead.rules || []).map(e);
    const specialText = [...sk, ...rl].join('<br>') || '<span class="nd">—</span>';

    const memberRows = members.map(m => {
      const injTag = m.injuries?.length ? ' <span class="inj-tag">†</span>' : '';
      return `<span class="m-name">${e(m.name)}${injTag}</span>`;
    }).join('');

    return `
<div class="print-card">
  <div class="card-top">
    <div class="col-name">
      <div class="wname">${e(groupName)}</div>
      <div class="wtype">${e(lead.title)}</div>
      <div class="wcost">&times; ${members.length} warrior${members.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="col-equip">
      <div class="col-lbl">Equipment</div>
      <div class="col-body">${gearText}</div>
    </div>
    <div class="col-skills">
      <div class="col-lbl">Special Rules</div>
      <div class="col-body">${specialText}</div>
    </div>
  </div>
  ${statTableHtml(lead.profile, lead.xp, 'Group XP')}
  <div class="member-roster">${memberRows}</div>
</div>`;
  }

  // ── Shared warband header (printed at top of each page) ────────
  const wbHeader = `
<table class="wb-hdr">
  <tr>
    <td class="wb-name-cell" colspan="3">
      <span class="wb-name">${e(warband.name)}</span>
      <span class="wb-faction">${e(def.name)}</span>
    </td>
  </tr>
  <tr>
    <td class="wb-stat"><span class="wbs-lbl">Gold Crowns</span><span class="wbs-val">${warband.gold}</span></td>
    <td class="wb-stat"><span class="wbs-lbl">Wyrdstone</span><span class="wbs-val">${warband.wyrdstone}</span></td>
    <td class="wb-stat"><span class="wbs-lbl">Warband Rating</span><span class="wbs-val">${rating}</span></td>
  </tr>
</table>`;

  const heroSection = heroes.length
    ? `<div class="cards-grid">${heroes.map(heroCardHtml).join('')}</div>`
    : `<p class="empty-page">No heroes recruited yet.</p>`;

  const henchSection = henchGroups.length
    ? `<div class="cards-grid">${henchGroups.map(henchCardHtml).join('')}</div>`
    : `<p class="empty-page">No henchmen recruited yet.</p>`;

  // ── CSS ────────────────────────────────────────────────────────
  const css = `
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @page { size: letter portrait; margin: 0.45in 0.4in; }
    body {
      font-family: Georgia, 'Palatino Linotype', 'Book Antiqua', serif;
      font-size: 9pt;
      color: #000;
      background: #fff;
    }
    .print-page { page-break-after: always; }
    .print-page:last-child { page-break-after: auto; }

    /* ── Section title (gothic-ish) ── */
    .section-title {
      text-align: center;
      font-size: 26pt;
      font-weight: 900;
      letter-spacing: 8px;
      text-transform: uppercase;
      font-variant: small-caps;
      border-bottom: 3px double #000;
      padding-bottom: 5pt;
      margin-bottom: 8pt;
      line-height: 1.1;
    }

    /* ── Warband header ── */
    .wb-hdr { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: 9pt; }
    .wb-name-cell { background: #1a1a1a; color: #fff; padding: 4pt 8pt; }
    .wb-name { font-size: 13pt; font-weight: bold; letter-spacing: 0.5px; margin-right: 9pt; }
    .wb-faction { font-size: 8.5pt; font-style: italic; opacity: 0.8; }
    .wb-stat { border: 1px solid #bbb; padding: 3pt 8pt; text-align: center; width: 33.3%; }
    .wbs-lbl { display: block; font-size: 6.5pt; text-transform: uppercase; letter-spacing: 1px; color: #666; }
    .wbs-val { display: block; font-size: 12pt; font-weight: bold; }

    /* ── Cards grid: 2 per row ── */
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7pt; }

    /* ── Individual card ── */
    .print-card { border: 2px solid #000; break-inside: avoid; page-break-inside: avoid; }

    /* ── 3-column top ── */
    .card-top {
      display: grid;
      grid-template-columns: 1.5fr 2fr 2fr;
      border-bottom: 2px solid #000;
      min-height: 44pt;
    }
    .col-name  { padding: 4pt 5pt; border-right: 1px solid #000; }
    .col-equip { padding: 4pt 5pt; border-right: 1px solid #000; }
    .col-skills { padding: 4pt 5pt; }

    .col-lbl {
      font-size: 6pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #777;
      border-bottom: 1px solid #ddd;
      padding-bottom: 1.5pt;
      margin-bottom: 2.5pt;
    }
    .col-body { font-size: 7.5pt; line-height: 1.5; }

    .wname  { font-size: 10.5pt; font-weight: bold; line-height: 1.2; }
    .wtype  { font-size: 7pt; font-style: italic; color: #444; margin-top: 1.5pt; }
    .wcost  { font-size: 7pt; color: #777; margin-top: 2pt; }

    .inj-tag { color: #8b0000; font-size: 7pt; font-style: italic; }
    .nd { color: #bbb; }

    .card-usernote {
      font-size: 6.5pt;
      font-style: italic;
      color: #555;
      margin-top: 3pt;
      padding-top: 2pt;
      border-top: 1px dashed #aaa;
    }

    /* ── Stat table ── */
    .stat-table { width: 100%; border-collapse: collapse; }
    .stat-head th {
      background: #d8d8d8;
      text-align: center;
      padding: 1.5pt 1pt;
      font-size: 7pt;
      font-weight: bold;
      border-right: 1px solid #aaa;
    }
    .stat-vals td {
      text-align: center;
      padding: 3pt 1pt;
      font-size: 10pt;
      font-weight: bold;
      border-right: 1px solid #ccc;
    }
    .stat-head th:last-child, .stat-vals td:last-child { border-right: none; }
    .xp-th { background: #bbb; min-width: 30pt; }
    .xp-td { background: #efefef; }

    /* ── Henchman member roster ── */
    .member-roster {
      display: flex;
      flex-wrap: wrap;
      gap: 3pt;
      padding: 3pt 5pt;
      border-top: 1px solid #000;
      background: #f8f8f8;
      min-height: 14pt;
    }
    .m-name { border: 1px solid #999; padding: 1pt 3pt; font-size: 7pt; }

    .empty-page { text-align: center; font-style: italic; color: #888; margin: 16pt 0; }
  `;

  const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>${e(warband.name)} — Mordheim Roster</title>
  <style>${css}</style>
</head>
<body>
  <div class="print-page">
    <div class="section-title">Heroes</div>
    ${wbHeader}
    ${heroSection}
  </div>
  <div class="print-page">
    <div class="section-title">Henchmen</div>
    ${wbHeader}
    ${henchSection}
  </div>
</body>
</html>`;

  const win = window.open('', '_blank');
  if (!win) { alert('Allow pop-ups for this page to print the roster.'); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(() => { try { win.print(); } catch(err) {} }, 500);
}

Object.assign(window, { Roster, RecruitModal, EquipModal, WarriorCard, TreasureBar, Section, EqTile, UnitTile, Tip, XpBar, AdvancementModal, LadsTalentCategoryModal, SpellbookModal, HireMoreModal, HiredSwordsModal, DramatisPersonaeModal, NotesModal, StockpileModal, GiveStockpileDialog, TradingPostModal, AssignItemModal, TpDetailDialog });

</script>
<script type="text/babel">
/* Mordheim Warband Tracker - main app */
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const MM = window.MORDHEIM;
const MF = window.MordheimFirebase; // null if Firebase SDK failed to load

// ---------- offline storage ----------
const STORAGE_KEY = "mordheim_v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { warbands: [], theme: "dark" }; }
  catch (_) { return { warbands: [], theme: "dark" }; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
}
const uid = () => Math.random().toString(36).slice(2, 10);

// ---------- export / import ----------
function exportWarband(wb) {
  const blob = new Blob([JSON.stringify(wb, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (wb.name || 'warband').replace(/[^a-z0-9 _\-]/gi, '').trim().replace(/\s+/g, '_') + '.mordheim.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportAllWarbands(warbands) {
  const out = { version: 1, exportedAt: new Date().toISOString(), warbands };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mordheim_warbands_' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importWarbands(onAdd) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        let wbs = [];
        if (Array.isArray(parsed)) {
          wbs = parsed;
        } else if (parsed.warbands && Array.isArray(parsed.warbands)) {
          wbs = parsed.warbands;
        } else if (parsed.id && Array.isArray(parsed.warriors)) {
          wbs = [parsed];
        } else {
          alert('Could not read file — make sure it is a Mordheim warband export.');
          return;
        }
        const valid = wbs.filter(wb => wb.faction && Array.isArray(wb.warriors) && MM.WARBANDS[wb.faction]);
        if (!valid.length) {
          alert('No valid warbands found in this file.');
          return;
        }
        const imported = valid.map(wb => ({ ...wb, id: uid(), importedAt: Date.now() }));
        onAdd(imported);
      } catch (_) {
        alert('Could not read the file. Make sure it is a valid Mordheim JSON export.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ---------- name pools ----------
const HERO_NAMES_M = ["Aldric Vossberg","Hans Reiner","Bruno Maltz","Lothar Strauss","Wilhelm Krieger","Kurt Steiner","Otto von Heim","Friedrich Bauer","Reinhardt Voss","Karl Schwarz","Theodor Greel","Konrad Stoltz"];
const HERO_NAMES_F = ["Sister Anya","Sister Mirella","Sister Edda","Sister Yvenne","Sister Cassandora","Sister Ilsa","Sister Margret","Sister Beatrice","Sister Roswitha","Sister Ottilia"];
const HERO_NAMES_DARK = ["Vyrnach the Pale","Drauven Mordl","Ulgath Crow","Thessian Black","Mordrek the Cursed","Sorvayne","Hessen Voiceless","Korben Ashmark"];
const HERO_NAMES_SK = ["Skritch","Veerin","Kessek-Klesh","Nyx Tail-bite","Shrik the Quiet","Kessil Verm","Hesska-Tor"];
function pickName(group) {
  if (group === "Sisters of Sigmar") return rand(HERO_NAMES_F);
  if (group === "The Undead" || group === "Cult of the Possessed") return rand(HERO_NAMES_DARK);
  if (group === "Skaven") return rand(HERO_NAMES_SK);
  return rand(HERO_NAMES_M);
}
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ---------- atmosphere ----------
function Atmosphere() {
  const ashes = useMemo(() => {
    return Array.from({ length: 28 }, (_, i) => ({
      left: Math.random()*100,
      delay: -Math.random()*30,
      duration: 14 + Math.random()*20,
      size: 1 + Math.random()*2.5,
      opacity: 0.2 + Math.random()*0.4,
    }));
  }, []);
  return (
    <React.Fragment>
      <div className="fog"></div>
      <div className="ash-layer">
        {ashes.map((a, i) => (
          <div key={i} className="ash" style={{
            left: a.left + "%",
            animationDelay: a.delay + "s",
            animationDuration: a.duration + "s",
            width: a.size + "px", height: a.size + "px",
            opacity: a.opacity,
          }}/>
        ))}
      </div>
    </React.Fragment>
  );
}
